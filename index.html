<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中壢課 自動排班系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root {
  --bg:#F7F6F3; --surface:#FFF; --surface2:#F0EEE9; --border:#E2DDD6;
  --accent:#8B6F5E; --accent2:#C4A882; --text:#2C2420; --text2:#7A6B62;
  --danger:#C0392B; --success:#27AE60; --warn:#E67E22; --info:#2980B9;
  --shift-off:#EDE8E3; --shift-leave:#F7D9D0; --shift-meeting:#E8D8F0; --shift-work:#D4E8D0;
  --shift-a:#D4E8D0; --shift-p:#D0E0F8; --shift-o:#FFE4B5; --shift-b:#FDE8F5; --shift-c:#E8F4E8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
header{background:var(--text);color:#FFF;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:500;letter-spacing:.5px}
header h1 span{color:var(--accent2);font-weight:700}
.header-actions{display:flex;gap:8px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#FFF}.btn-primary:hover{background:#7A5E4E}
.btn-ghost{background:transparent;color:#FFF;border:1px solid rgba(255,255,255,.3)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:var(--danger);color:#FFF}
.btn-success{background:var(--success);color:#FFF}
.btn-warn{background:var(--warn);color:#FFF}
.btn-info{background:var(--info);color:#FFF}
.btn-outline{background:#FFF;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-purple{background:#7D3C98;color:#FFF}
.app{display:flex;height:calc(100vh - 52px)}
nav{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;overflow-y:auto}
.nav-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;padding:4px 20px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin:1px 8px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#FFF}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
main{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text2);margin-top:3px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}
/* Schedule grid */
.sg{border-collapse:collapse;font-size:11px}
.sg th,.sg td{border:1px solid var(--border);padding:2px 3px;text-align:center;white-space:nowrap;min-width:28px}
.sg th{background:var(--surface2);font-size:10px;font-weight:600;position:sticky;top:0;z-index:2}
.sg .col-name{background:#F5F2EE!important;font-weight:600;text-align:left!important;padding-left:8px!important;min-width:72px;position:sticky;left:0;z-index:3}
.sg .col-hours{min-width:42px;font-weight:600;font-size:11px}
.sg .col-hours.over{background:#FDECEA!important;color:var(--danger)}
.sg .col-hours.under{background:#FEF9E7!important;color:var(--warn)}
.sg .col-hours.ok{background:#EEF8EE!important;color:var(--success)}
.dh-weekend{background:#EEE8F0!important}
.cell-off{background:var(--shift-off);color:#9B8B7E;cursor:pointer}
.cell-leave{background:var(--shift-leave);color:#C0392B;font-weight:600;cursor:pointer}
.cell-meeting{background:var(--shift-meeting);color:#7D3C98;font-weight:600;cursor:pointer}
.cell-work{background:var(--shift-work);cursor:pointer}
.cell-shiftA{background:var(--shift-a);cursor:pointer}
.cell-shiftP{background:var(--shift-p);cursor:pointer}
.cell-shiftO{background:var(--shift-o);cursor:pointer}
.cell-shiftB{background:var(--shift-b);color:#8E44AD;cursor:pointer}
.cell-shiftC{background:var(--shift-c);color:#1E8449;cursor:pointer}
.cell-work:hover,.cell-off:hover,.cell-leave:hover,.cell-meeting:hover{filter:brightness(.92);outline:2px solid var(--accent)}
.cell-locked{background:#FFF8DC!important;position:relative}
.cell-locked::after{content:'🔒';font-size:7px;position:absolute;top:1px;right:1px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:var(--text2)}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#FFF;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-leader{background:#F9E4B7;color:#B7770D}
.badge-staff{background:#D6EAF8;color:#1A5276}
.badge-wacoal{background:#FAD7D7;color:#922B21}
.badge-savvy{background:#D5F5E3;color:#1E8449}
.badge-beenteen{background:#E8DAEF;color:#6C3483}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px}
.legend-box{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start}
.alert-warn{background:#FEF9E7;border:1px solid #F9CA74;color:#7D6608}
.alert-info{background:#EAF4FB;border:1px solid #85C1E9;color:#154360}
.alert-danger{background:#FDECEA;border:1px solid #F1948A;color:#7B241C}
.alert-success{background:#EAFAF1;border:1px solid #82E0AA;color:#196F3D}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border-radius:12px;padding:24px;width:520px;max-width:92vw;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.month-label{font-size:16px;font-weight:700;min-width:100px;text-align:center}
.assign-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#EAF4FB;color:#1A5276;margin:1px}
.history-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.history-card{border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;text-align:center;transition:all .15s}
.history-card:hover{border-color:var(--accent);background:var(--surface2)}
.history-card.has-data{border-color:var(--accent2);background:#FFFAF5}
.history-card .hc-month{font-size:16px;font-weight:700}
.history-card .hc-label{font-size:11px;color:var(--text2);margin-top:2px}

/* ── 登入覆蓋層 ── */
#login-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.login-logo{font-size:36px;margin-bottom:8px}
.login-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:16px;text-align:center;letter-spacing:4px;font-family:monospace;margin-bottom:12px}
.login-input:focus{outline:none;border-color:var(--accent)}
.login-err{color:var(--danger);font-size:12px;margin-bottom:10px;min-height:16px}
.login-guest{font-size:12px;color:var(--text2);cursor:pointer;text-decoration:underline;margin-top:12px;display:block}
/* 頂部登入狀態列 */
.header-login{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.8)}
.header-login strong{color:#FFF}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media print{
  /* 隱藏所有導覽/按鈕 */
  nav,.header-actions,.btn,.tabs,.month-nav,
  .page-header .btn, .alert,
  #nav-schedule-all,#nav-store-view,#nav-staff-view,
  #nav-history,#nav-manage,#nav-settings,
  .nav-section,.nav-logo{display:none!important}

  /* 版面設定 */
  @page{size:A4 landscape;margin:8mm 6mm}
  body,html{background:#FFF!important;font-size:9px}
  .app{display:block!important;height:auto!important}
  nav{display:none!important}
  main{padding:2px!important;overflow:visible!important}
  .card{border:1px solid #CCC!important;padding:4px!important;margin-bottom:4px!important;break-inside:avoid}

  /* 班表表格 */
  .sg,.sg table{font-size:7.5px!important;width:100%!important}
  .sg th,.sg td{padding:1px 2px!important}

  /* 店家視角每人區塊不跨頁 */
  [style*="margin-bottom:16px"]{break-inside:avoid;page-break-inside:avoid}

  /* 表格不跨頁 */
  table{break-inside:avoid;page-break-inside:avoid}

  /* 色彩保留 */
  * {-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

  /* 標題列保留顯示 */
  .page-header{display:flex!important;padding:4px 0!important;margin-bottom:4px!important}
  .page-title{font-size:13px!important;font-weight:700!important}
  .page-sub{font-size:10px!important}

  /* 簽名欄放大一點 */
  [style*="border-top:2px solid"]{font-size:11px!important}
}
</style>
<!-- ═══════════════════════════════════════════════
     Firebase SDK（雲端同步）
     設定說明請見 docs/firebase-setup.md
     ═══════════════════════════════════════════════ -->
<script type="module">
  // ── Firebase 設定 ──────────────────────────────
  // 請填入你的 Firebase 專案設定值
  // 取得方式：Firebase Console → 專案設定 → 您的應用程式
  const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAouhpSMvx_5hLgcyKMIXby3xnrSlLwXAY",
  authDomain: "schedule-af163.firebaseapp.com",
  projectId: "schedule-af163",
  storageBucket: "schedule-af163.firebasestorage.app",
  messagingSenderId: "998984586614",
  appId: "1:998984586614:web:b57156c73c4719d8529657",
  measurementId: "G-ZBECW54RBK"
};
  // ───────────────────────────────────────────────

  // 偵測是否已填入設定（避免未設定時報錯）
  const FB_READY = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";

  if(FB_READY){
    const { initializeApp } = await import("https://cdn.jsdelivr.net/npm/firebase@10.12.0/app/+esm");
    const { getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp }
      = await import("https://cdn.jsdelivr.net/npm/firebase@10.12.0/firestore/+esm");

    const app = initializeApp(FIREBASE_CONFIG);
    const db  = getFirestore(app);

    // ── 工具函數：取得當前月份 document key ──────
    function getMonthKey(y, m){
      return `${y}-${String(m).padStart(2,'0')}`;
    }

    // ── 雲端儲存：把 STATE 推到 Firestore ─────────
    window.saveToCloud = async function(showMsg=false){
      if(!window.STATE) return;
      const key = getMonthKey(STATE.currentYear, STATE.currentMonth);
      const payload = {
        staff:            STATE.staff,
        stores:           STATE.stores,
        shifts:           STATE.shifts,
        groups:           STATE.groups,
        schedules:        STATE.schedules,
        specialEvents:    STATE.specialEvents,
        staffAssignments: STATE.staffAssignments,
        storeViewNotes:   STATE.storeViewNotes  || {},
        storeShiftTimes:  STATE.storeShiftTimes || {},
        biweeklyAnchor:   STATE.biweeklyAnchor,
        biweeklyOverrides:STATE.biweeklyOverrides,
        savedAt:          new Date().toISOString(),
        savedBy:          STATE.login?.empNo || 'unknown',
        updatedAt:        serverTimestamp(),
      };
      try{
        await setDoc(doc(db, 'schedules', key), payload);
        if(showMsg && window.showToast) showToast('☁️ 已同步至雲端');
        if(window.updateSaveStatus) updateSaveStatus(true);
      }catch(e){
        console.warn('Firebase 同步失敗:', e);
        if(showMsg && window.showToast) showToast('⚠️ 雲端同步失敗，資料已存本機');
        if(window.updateSaveStatus) updateSaveStatus(false);
      }
    };

    // ── 雲端載入：從 Firestore 還原 STATE ─────────
    window.loadFromCloud = async function(y, m){
      const key = getMonthKey(y || STATE.currentYear, m || STATE.currentMonth);
      try{
        const snap = await getDoc(doc(db, 'schedules', key));
        if(!snap.exists()) return false;
        const data = snap.data();
        if(data.staff)            STATE.staff            = data.staff;
        if(data.stores)           STATE.stores           = data.stores;
        if(data.shifts?.length)   STATE.shifts           = data.shifts;
        if(data.groups?.length)   STATE.groups           = data.groups;
        if(data.schedules)        STATE.schedules        = data.schedules;
        if(data.specialEvents)    STATE.specialEvents    = data.specialEvents;
        if(data.staffAssignments) STATE.staffAssignments = data.staffAssignments;
        if(data.storeViewNotes)   STATE.storeViewNotes   = data.storeViewNotes;
        if(data.storeShiftTimes)  STATE.storeShiftTimes  = data.storeShiftTimes;
        if(data.biweeklyAnchor)   STATE.biweeklyAnchor   = data.biweeklyAnchor;
        if(data.biweeklyOverrides)STATE.biweeklyOverrides= data.biweeklyOverrides;
        // 雲端載入後同步更新 localStorage，確保兩邊一致
        if(window.saveToStorage) saveToStorage();
        console.log('☁️ 已從 Firestore 載入', key, '儲存時間:', data.savedAt, '儲存者:', data.savedBy);
        return true;
      }catch(e){
        console.warn('Firebase 載入失敗:', e);
        return false;
      }
    };

    // ── 即時監聽：其他人儲存後自動載入最新資料 ──
    window._cloudUnsub = null;
    window._lastSavedAt = '';
    window.startCloudSync = function(){
      if(window._cloudUnsub) window._cloudUnsub();
      const key = getMonthKey(STATE.currentYear, STATE.currentMonth);
      window._cloudUnsub = onSnapshot(doc(db, 'schedules', key), async (snap)=>{
        if(!snap.exists()) return;
        const data = snap.data();
        const remoteBy  = data.savedBy  || '';
        const remoteSAt = data.savedAt  || '';
        const myEmpNo   = STATE.login?.empNo || '';
        // 不是自己的儲存，且時間戳不同 → 自動靜默載入最新
        if(remoteBy && remoteBy !== myEmpNo && remoteSAt !== window._lastSavedAt){
          window._lastSavedAt = remoteSAt;
          await window.loadFromCloud();
          const t = remoteSAt ? new Date(remoteSAt).toLocaleTimeString('zh-TW') : '';
          if(window.showToast) showToast(`☁️ ${remoteBy} 已更新（${t}），已自動同步`);
          if(window.showPage) showPage(window.STATE?.currentPage || 'dashboard');
        }
      });
    };

    console.log('✅ Firebase 已初始化，專案：', FIREBASE_CONFIG.projectId);
    // _init() 會輪詢等待 window.saveToCloud 出現後自動執行雲端同步
  } else {
    // 未設定 Firebase，掛載空函數避免錯誤
    window.saveToCloud   = async ()=>{};
    window.loadFromCloud = async ()=> false;
    window.startCloudSync = ()=>{};
    console.info('ℹ️ Firebase 未設定，使用純本機模式（localStorage）');
  }
</script>

<header>

<script>
// ==================== 常數 ====================
const DAY_NAMES=['日','一','二','三','四','五','六'];
const BRAND_NAMES={wacoal:'華歌爾',savvy:'莎薇',beenteen:'嬪婷',salou:'莎露',gold_wacoal:'金華歌爾',sleep_wacoal:'華睡'};
const BRAND_LIST=[{value:'wacoal',label:'華歌爾'},{value:'savvy',label:'莎薇'},{value:'beenteen',label:'嬪婷'},{value:'salou',label:'莎露'},{value:'gold_wacoal',label:'金華歌爾'},{value:'sleep_wacoal',label:'華睡'}];
const CHANNEL_LIST=[{value:'dept',label:'百貨'},{value:'counter',label:'專櫃'},{value:'outlet',label:'OUTLET'},{value:'shop',label:'專門店'},{value:'wholesale',label:'量販店'},{value:'sale',label:'特賣會'},{value:'popup',label:'臨時店點'},{value:'office',label:'辦公室'}];
const CHANNEL_NAMES={dept:'百貨',counter:'專櫃',outlet:'OUTLET',shop:'專門店',wholesale:'量販店',sale:'特賣會',popup:'臨時店點',office:'辦公室'};
const STAFF_ALLOC_LIST=[0.5,1,1.5,2,2.5,3,3.5,4,5];
const CELL_TYPES=['work','off','leave','meeting','training'];

// ==================== 狀態 ====================
const STATE={
  currentPage:'dashboard',
  currentYear:new Date().getFullYear(),
  currentMonth:new Date().getMonth()+1,
  staff:[],stores:[],schedules:{},specialEvents:[],shifts:[],
  staffAssignments:{},
  biweeklyAnchor:'2025-07-05',
  biweeklyOverrides:{},
  login:{loggedIn:false,empNo:'',role:'guest'},
  storeViewNotes:{},
  // 動態組別，每個組別可有自己的組長
  // { id, name, leaderEmpNos:[], color }
  groups:[],

function buildLoginAccounts(){
  const accs={...LOGIN_ACCOUNTS};
  // 每個組的組長（role=leader）都可以用工號登入
  STATE.staff.filter(s=>s.role==='leader'&&s.empNo).forEach(s=>{

  const acc=accs[empNo.trim()];
  if(!acc)return false;
  STATE.login={loggedIn:true,empNo:empNo.trim(),...acc};
  localStorage.setItem('sch_login',JSON.stringify({...STATE.login,ts:Date.now()}));

}

function restoreLogin(){
  try{
    const saved=JSON.parse(localStorage.getItem('sch_login')||'{}');
    if(saved.loggedIn&&saved.ts&&(Date.now()-saved.ts<28800000)){
      STATE.login={loggedIn:true,empNo:saved.empNo,role:saved.role,name:saved.name};
      return true;
    }
  }catch(e){}
  return false;
}

// ==================== 工具 ====================
function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function getDOW(y,m,d){return new Date(y,m-1,d).getDay()}
function isWeekend(y,m,d){const w=getDOW(y,m,d);return w===0||w===6}
function pad(n){return String(n).padStart(2,'0')}
function schedKey(y,m){return `${y}-${pad(m)}`}
function getMS(y,m){const k=schedKey(y,m);if(!STATE.schedules[k])STATE.schedules[k]={};return STATE.schedules[k]}
function getSD(sid,y,m){const ms=getMS(y,m);if(!ms[sid])ms[sid]={};return ms[sid]}

// ── 雙週計算 ──
// 從錨點 2025-07-05 往前/後推，每14天一個週期
function getAnchorDate(y, m){
  const key = `${y}-${pad(m)}`;
  if(STATE.biweeklyOverrides[key]){
    const d = new Date(STATE.biweeklyOverrides[key]+'T00:00:00');
    return d;
  }
  // 從全域錨點推算
  const anchor = new Date(STATE.biweeklyAnchor+'T00:00:00');
  const target = new Date(y, m-1, 1); // 該月1號
  const diffMs = target - anchor;
  const diffDays = Math.floor(diffMs / 86400000);
  // 找到 <= target 的最近週期起點
  let offset = diffDays % 14;
  if(offset < 0) offset += 14;
  const periodStart = new Date(target);
  periodStart.setDate(periodStart.getDate() - offset);
  return periodStart;
}

// 取得某月所有雙週週期（以日期數字陣列表示）
// 回傳 [ {label, start, end, days:[], isHalf}, ... ]
// start/end 是該月內的日期數字(1~31)
function getBiweeklyPeriods(y, m){
  const totalDays = daysInMonth(y, m);
  const anchorInMonth = getAnchorDate(y, m); // 本月第一個雙週起始（可能在月外）
  const periods = [];
  // 找所有跨越本月的雙週週期
  let ps = new Date(anchorInMonth);
  // 往前找到第一個可能覆蓋本月的週期起點
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m-1, totalDays);
  while(ps > monthStart) ps.setDate(ps.getDate()-14);
  // 現在 ps 是第一個可能的週期起點（在本月前或本月內）
  let idx = 1;
  while(true){
    const pe = new Date(ps); pe.setDate(pe.getDate()+13); // 週期結束日
    if(ps > monthEnd) break;
    // 週期與本月有交集
    const startInMonth = ps < monthStart ? 1 : ps.getDate();
    const endInMonth   = pe > monthEnd   ? totalDays : pe.getDate();
    const days = [];
    for(let d=startInMonth; d<=endInMonth; d++) days.push(d);
    const psLabel = `${ps.getMonth()+1}/${ps.getDate()}`;
    const peLabel = `${pe.getMonth()+1}/${pe.getDate()}`;
    periods.push({
      idx,
      label: `第${idx}雙週（${psLabel}～${peLabel}）`,
      periodStart: new Date(ps),
      periodEnd: new Date(pe),
      startInMonth, endInMonth, days,
      isPartial: ps < monthStart || pe > monthEnd,
    });
    ps.setDate(ps.getDate()+14);
    idx++;
  }
  return periods;
}

// 取得某日屬於哪個雙週週期 index（1-based，同 getBiweeklyPeriods）
function getBiweeklyIdxForDay(y, m, d, periods){
  return (periods.find(p=>p.days.includes(d))?.idx)||1;
}

// 計算某雙週週期內的工時（用 periodStart/periodEnd 跨月計算）
function calcPeriodHours(staffId, periodStart, periodEnd){
  let h = 0;
  const cur = new Date(periodStart);
  while(cur <= periodEnd){
    const y = cur.getFullYear(), mo = cur.getMonth()+1, d = cur.getDate();
    const ms = STATE.schedules[schedKey(y,mo)]||{};
    const c = (ms[staffId]||{})[d];
    if(c&&c.type==='work'&&c.shiftId){
      const stx=STATE.stores.find(q=>q.id===c.storeId);
      const dwx=new Date(cur).getDay();h+=getCellWorkH(c,stx,dwx);
    }
    cur.setDate(cur.getDate()+1);
  }
  return h;
}

// 計算某雙週週期內的公休天數（type==='off' 的天數）
function calcPeriodOffDays(staffId, periodStart, periodEnd){
  let off = 0;
  const cur = new Date(periodStart);
  while(cur <= periodEnd){
    const y=cur.getFullYear(),mo=cur.getMonth()+1,d=cur.getDate();
    const ms=STATE.schedules[schedKey(y,mo)]||{};
    const c=(ms[staffId]||{})[d];
    if(!c||c.type==='off') off++;
    cur.setDate(cur.getDate()+1);
  }
  return off;
}

// 取得某店某班某天的上班開始時間（HH:MM 字串）
// 優先讀 store.shiftTimes，其次讀全域 storeShiftTimes
function getShiftStartTime(storeNo, shiftCode, dow){
  const dowKey=['sun','mon','tue','wed','thu','fri','sat'][dow];
  const store=STATE.stores.find(x=>x.storeNo===storeNo);
  const localTimes=store?.shiftTimes?.[shiftCode];
  if(localTimes&&localTimes[dowKey]) return localTimes[dowKey];
  const globalTimes=STATE.storeShiftTimes?.[storeNo]?.[shiftCode];
  if(globalTimes&&globalTimes[dowKey]) return globalTimes[dowKey];
  return null;
}

// 將 "HH:MM" 轉成分鐘數
function toMin(timeStr){
  if(!timeStr) return null;
  const [h,m]=(timeStr||'').split(':').map(Number);
  return h*60+(m||0);
}

// ★ 核心：動態計算某店某班某天的服勤時數和用餐時數
// store: 店家物件；shiftCode: 'A'|'P'|'O'|'C'；dow: 0-6（0=日）
// 回傳 { workH, mealH } 均為小數（如 8.5, 0.5）
function calcShiftHours(store, shiftCode, dow){
  if(!store||!shiftCode) return {workH:0, mealH:0};
  const weekend=(dow===0||dow===6);
  // 關店時間：週末可能不同
  const closeStr=weekend?(store.closeWeekend||store.close):store.close;
  const closeM=toMin(closeStr);
  if(closeM===null) return {workH:0, mealH:0};

  // 開始時間：從 APOC 設定讀取
  const startStr=getShiftStartTime(store.storeNo, shiftCode, dow);
  // 如果沒有設定此班的開始時間，fallback 到店家開店時間（A/O班）
  const openStr=store.open||'10:00';
  const startM=toMin(startStr||openStr);

  // 在店總時數（分鐘）
  const totalMin=closeM-startM;
  if(totalMin<=0) return {workH:0, mealH:0};

  const totalH=totalMin/60;
  // 用餐時間：在店超過8小時 → 1小時；否則 → 0.5小時
  const mealH=totalH>8?1:0.5;
  const workH=Math.round((totalH-mealH)*2)/2; // 四捨五入到 0.5

  return {workH, mealH};
}

// 從 CellData 取得服勤時數（用於統計顯示和 Excel 匯出）
// c: CellData；store: 店家物件；dow: 0-6
function getCellWorkH(c, store, dow){
  if(!c||c.type!=='work') return 0;
  // 若有手動覆寫時數，優先用手動值
  if(c.customHours!=null) return c.customHours;
  const sh=STATE.shifts.find(x=>x.id===c.shiftId);
  if(!sh) return 0;
  if(!store) return 0;
  return calcShiftHours(store, sh.code, dow).workH;
}

// 從 CellData 取得用餐時數
function getCellMealH(c, store, dow){
  if(!c||c.type!=='work') return 0;
  if(c.customMeal!=null) return c.customMeal;
  const sh=STATE.shifts.find(x=>x.id===c.shiftId);
  if(!sh) return 0;
  if(!store) return 0;
  return calcShiftHours(store, sh.code, dow).mealH;
}

// 計算某人某月總服勤時數
function calcHours(sid,y,m){
  const sd=getSD(sid,y,m);
  const ms_all=STATE.schedules[schedKey(y,m)]||{};
  let h=0;
  for(const day in sd){
    const c=sd[day];
    if(c&&c.type==='work'&&c.shiftId){
      const store=STATE.stores.find(x=>x.id===c.storeId);
      const dow=getDOW(y,m,parseInt(day));
      h+=getCellWorkH(c,store,dow);
    }
  }
  return h;
}

// ── 店時數計算與驗證 ──
// 派員數對應月時數上限：(月天數-8公休) × 8h × 派員數
function storeHoursLimit(staffAlloc, monthDays){
  return (monthDays - 8) * 8 * staffAlloc;
}
// 計算某店實際已排時數（本月）
function calcStoreHoursMonth(storeId, y, m){
  const days=daysInMonth(y,m);
  const ms=STATE.schedules[schedKey(y,m)]||{};
  const store=STATE.stores.find(x=>x.id===storeId);
  let total=0;
  STATE.staff.forEach(s=>{
    const sd=ms[s.id]||{};
    for(let d=1;d<=days;d++){
      const c=sd[d];
      if(c&&c.type==='work'&&c.storeId===storeId&&c.shiftId){
        const dow=getDOW(y,m,d);
        total+=getCellWorkH(c,store,dow);
      }
    }
  });
  return total;
}
// 取得所有店家的時數狀態（超標/正常/不足）
function getStoreHoursStatus(y, m){
  const days=daysInMonth(y,m);
  return STATE.stores.filter(st=>st.groupId!=='office').map(st=>{
    const limit=storeHoursLimit(st.staffAlloc, days);
    const actual=calcStoreHoursMonth(st.id, y, m);
    const pct=limit>0?Math.round(actual/limit*100):0;
    return {store:st, limit, actual, pct,
      status: actual>limit?'over': actual>=limit*0.9?'ok':'under'};
  });
}
function getAssignedStores(sid){return STATE.staffAssignments[sid]||[]}
function setAssignedStores(sid,storeIds){STATE.staffAssignments[sid]=storeIds}

// ==================== 自動排班 ====================

function autoScheduleGroup(y,m,gid){
  const days=daysInMonth(y,m);
  const ms=getMS(y,m);
  const staffList=STATE.staff.filter(s=>s.groupId===gid && !s.excludeAuto && s.status!=='excluded' && (!s.status||s.status==='active'));
  const storeList=STATE.stores.filter(s=>s.groupId===gid && s.staffAlloc>0);
  const periods=getBiweeklyPeriods(y,m);

  // ① 保留鎖定格
  const locked={};
  staffList.forEach(s=>{
    locked[s.id]={};
    const sd=ms[s.id]||{};
    for(const day in sd){if(sd[day]&&sd[day].locked)locked[s.id][day]=sd[day]}
  });

  // ① 附加：把 ms 裡的特休/開會/訓練格子同步到 specialEvents
  const allGroupStaff=STATE.staff.filter(s=>s.groupId===gid);
  allGroupStaff.forEach(s=>{
    const sd=ms[s.id]||{};
    for(let d=1;d<=days;d++){
      const c=sd[d];
      if(c&&(c.type==='leave'||c.type==='meeting'||c.type==='training')){
        const dateStr=`${y}-${pad(m)}-${pad(d)}`;
        const already=STATE.specialEvents.find(e=>e.staffId===s.id&&e.date===dateStr);
        if(!already){
          STATE.specialEvents.push({id:'ev_sync_'+s.id+'_'+d, staffId:s.id, date:dateStr, type:c.type, note:''});
        } else if(already.type!==c.type){
          already.type=c.type;
        }
      }
    }
  });

  // ② 重設此組
  allGroupStaff.forEach(s=>{ms[s.id]={}});

  // ③ 先填入特殊事件（特休/開會/訓練）
  STATE.specialEvents.forEach(e=>{
    const parts=(e.date||'').split('-');
    if(parts.length<3) return;
    const ey=parseInt(parts[0]),em=parseInt(parts[1]),ed=parseInt(parts[2]);
    if(ey===y&&em===m){
      const day=ed;
      const s=allGroupStaff.find(x=>x.id===e.staffId);
      if(s){if(!ms[s.id])ms[s.id]={};ms[s.id][day]={type:e.type,locked:true}}
    }
  });

  // ④ 填入鎖定格（不覆蓋特殊事件）
  staffList.forEach(s=>{
    for(const day in locked[s.id]){
      if(!ms[s.id][day]) ms[s.id][day]=locked[s.id][day];
    }
  });

  // ⑤ 初始化工時追蹤
  const periodWorkedH={};
  const weekWorked={};
  staffList.forEach(s=>{
    periodWorkedH[s.id]={};
    periods.forEach(p=>{periodWorkedH[s.id][p.idx]=0});
    for(let w=0;w<10;w++) weekWorked[`${s.id}_${w}`]=0;
    const sd=ms[s.id]||{};
    for(const day in sd){
      const c=sd[day];
      if(c&&c.type==='work'&&c.shiftId){
        const pidx=getBiweeklyIdxForDay(y,m,parseInt(day),periods);
        const store=storeList.find(st=>st.id===c.storeId);
        const dow=getDOW(y,m,parseInt(day));
        const h=getCellWorkH(c,store,dow);
        periodWorkedH[s.id][pidx]=(periodWorkedH[s.id][pidx]||0)+h;
        const wk=Math.floor((parseInt(day)-1)/7);
        weekWorked[`${s.id}_${wk}`]=(weekWorked[`${s.id}_${wk}`]||0)+1;
      }
    }
  });

  // ── [修正F·v8] 預算每人每月可排班天數（按各店 staffAlloc 比例預分配）──
  // v7 bug：用「全月30天」當基底，導致睡衣預算23天 > 實際可上班天數(~21天)，
  // 預算永遠用不完，巴斯一天都搶不到。
  // v8：基底改用「可工作天數」= 全月天數 - 全月公休目標天數（雙週4天等比）
  const monthOffTarget = Math.round(days/14*4);            // 30天月 ≈ 9天公休
  const monthWorkDays  = days - monthOffTarget;            // 30天月 ≈ 21天可工作

  // 每人每店「月排班天數上限」
  // staffMonthBudget[staffId][storeId] = 最多排幾天
  // v8：比例基底改用「個人分擔份額」= 店staffAlloc ÷ 該店指派人數
  // （睡衣1.5有2人指派 → 麥菁云在睡衣的份額是0.75；巴斯0.5只有她1人 → 份額0.5
  //   → 麥菁云預算比例 = 0.6 : 0.4，巴斯約可分到8天，而非v7的搶不到）
  const staffMonthBudget={};
  const storeAssignCount={};
  storeList.forEach(st=>{
    storeAssignCount[st.id]=staffList.filter(s=>getAssignedStores(s.id).includes(st.id)).length||1;
  });
  staffList.forEach(s=>{
    staffMonthBudget[s.id]={};
    const assignedStoreIds=getAssignedStores(s.id);
    if(assignedStoreIds.length===0) return;
    // 各店「個人份額」：店staffAlloc 先扣掉「只指派這一間店」同事的全職貢獻(各1.0)，
    // 剩餘份額由多店人員均分。
    // 例：睡衣1.5 = 陳淑蓮(單店,1.0) + 麥菁云分擔0.5；巴斯0.5只有麥 → 0.5
    //     → 麥菁云比例 0.5:0.5，巴斯約可分到10天（v7搶不到、份額版只有8天）
    const shares=assignedStoreIds.map(sid=>{
      const st=storeList.find(x=>x.id===sid);
      if(!st) return {sid, share:0};
      const others=staffList.filter(o=>o.id!==s.id&&getAssignedStores(o.id).includes(sid));
      const singleStoreOthers=others.filter(o=>getAssignedStores(o.id).length===1).length;
      const multiStoreOthers=others.length-singleStoreOthers;
      const residual=Math.max(0.25, st.staffAlloc-singleStoreOthers);
      return {sid, share: residual/(multiStoreOthers+1)};
    });
    const totalShare=shares.reduce((sum,x)=>sum+x.share,0);
    if(totalShare<=0) return;
    shares.forEach(({sid,share})=>{
      if(share<=0) return;
      const ratio=share/totalShare;
      // 此人在此店的月目標天數（以可工作天為基底，至少1天）
      staffMonthBudget[s.id][sid]=Math.max(1, Math.round(monthWorkDays*ratio));
    });
  });

  // 每人在各店已排天數追蹤
  const staffStoreDays={};
  staffList.forEach(s=>{staffStoreDays[s.id]={};});

  // ── [修正B] canTakeOff：單人店（staffAlloc<=1）允許公休 ──
  // 單人專櫃本來就接受她休息時店沒人的情況
  // 多人店才需要確保 minDaily 人出勤
  function canTakeOff(sid, d){
    const c=ms[sid]?.[d];
    if(c&&c.type!=='work'&&c.type!==undefined) return true; // 已有特殊安排
    if(c?.locked) return false; // 鎖定工作格不可覆蓋
    const assignedStores=getAssignedStores(sid);
    if(assignedStores.length===0) return true; // 無指派店，可休
    for(const storeId of assignedStores){
      const store=STATE.stores.find(x=>x.id===storeId);
      if(!store) continue;
      // [修正B核心] staffAlloc<=1 的單人店：允許公休，不做人數限制
      if((store.staffAlloc||1)<=1) continue;
      const dow=getDOW(y,m,d);
      const closedDays=store.closedDOW||[];
      if(closedDays.includes(dow)) continue; // 店今天公休
      // 多人店：檢查若我休息，店還有沒有足夠人數
      const assignedToStore=staffList.filter(s=>getAssignedStores(s.id).includes(storeId));
      const definiteOff=assignedToStore.filter(s=>{
        const sc=ms[s.id]?.[d];
        return sc&&sc.type!=='work'&&sc.type!==undefined;
      }).length;
      const wouldWork=assignedToStore.length-definiteOff-1;
      if(wouldWork<(store.minDaily||1)) return false;
    }
    return true;
  }

  // ── [修正I·v8] 估算每人平均班別時數（依指派店的 APOC 動態時數）──
  // 單人店（正大/融辰）只有A班 10.5h → 雙週80h只夠上7天 → 公休應為7天/雙週
  // v7 公休預分配固定只放4天，多出的公休被80h上限擠到雙週尾端（連三休）
  function estimateAvgShiftH(s){
    const stIds=getAssignedStores(s.id);
    const sts=stIds.map(sid=>STATE.stores.find(x=>x.id===sid)).filter(Boolean);
    if(sts.length===0) return 8;
    let sum=0,n=0;
    sts.forEach(st=>{
      const dow=3; // 以週三為代表日
      const aH=calcShiftHours(st,'A',dow).workH||0;
      const oStart=getShiftStartTime(st.storeNo,'O',dow);
      const pStart=getShiftStartTime(st.storeNo,'P',dow);
      if((st.staffAlloc||1)<2&&oStart){
        // 單人覆蓋型店（睡衣等）：多數日子排O班顧全天 → 用O班時數估
        sum+=calcShiftHours(st,'O',dow).workH||aH;
      } else if(pStart){
        const pH=calcShiftHours(st,'P',dow).workH||0;
        sum+=(aH+pH)/2; // 有P班的多人店：A/P各半
      } else {
        sum+=aH; // 只有A班的店（正大/融辰）
      }
      n++;
    });
    return n?Math.max(4, sum/n):8;
  }

  // ── [修正C+I·v8] 公休分配：雙週內均勻分布 ──
  // 公休目標 = max(政策4天等比, 雙週天數 - 80h上限可上的天數)
  staffList.forEach(s=>{
    const avgH=estimateAvgShiftH(s);
    periods.forEach(p=>{
      const periodDays=p.days;
      const periodMaxHForP=Math.round((periodDays.length/14)*80);
      // 政策最低公休（雙週4天等比）
      const policyOff=Math.max(1, Math.round((periodDays.length/14)*4));
      // 工時上限可上的天數（扣掉已排鎖定工時）
      const alreadyH=periodWorkedH[s.id]?.[p.idx]||0;
      const maxWorkDays=Math.max(0, Math.floor((periodMaxHForP-alreadyH)/avgH));
      const alreadyWorkDays=periodDays.filter(d=>ms[s.id]?.[d]?.type==='work').length;
      const hourOff=periodDays.length-alreadyWorkDays-maxWorkDays;
      const offTarget=Math.max(policyOff, hourOff);
      const specialCount=periodDays.filter(d=>{
        const c=ms[s.id]?.[d];
        return c&&(c.type==='leave'||c.type==='meeting'||c.type==='training');
      }).length;
      const needOff=Math.max(0, offTarget-specialCount);
      if(needOff===0) return;

      // 可排公休的天（空格且可休）
      const available=periodDays.filter(d=>{
        if(ms[s.id]?.[d]) return false;
        return canTakeOff(s.id, d);
      });
      if(available.length===0) return;

      // 均勻分布：把可用天等分成 needOff+1 段，取每段中間點
      const offDays=[];
      const total=available.length;
      for(let i=0;i<needOff;i++){
        const idx=Math.floor((i+0.5)*(total/(needOff)));
        const target=available[Math.min(idx, total-1)];
        if(!offDays.includes(target)) offDays.push(target);
      }
      // 若數量不足，補在未選的空位
      for(let i=0;i<available.length&&offDays.length<needOff;i++){
        if(!offDays.includes(available[i])) offDays.push(available[i]);
      }
      offDays.forEach(d=>{ms[s.id][d]={type:'off'}});
    });
  });

  // 連上6天強制休（最後保險）：掃一遍，發現連6天未休就強插公休
  // 注意：此時 ms 格子可能是 off / leave / meeting / training / work / undefined(空)
  // isRest = 已有非上班安排 → 重置計數
  // 空格(undefined) 或 work → 算連班天，達6天則插公休
  staffList.forEach(s=>{
    let consecutive=0;
    for(let d=1;d<=days;d++){
      const c=ms[s.id]?.[d];
      const isRest=c&&(c.type==='off'||c.type==='leave'||c.type==='meeting'||c.type==='training');
      if(isRest){
        consecutive=0;
      } else {
        consecutive++;
        if(consecutive>=6){
          // 空格（undefined）才能插公休；work格若是鎖定的就不動
          if(!c){ // 空格 → 插公休
            if(canTakeOff(s.id,d)){
              ms[s.id][d]={type:'off'};
              consecutive=0;
            }
          }
          // work格（已排班）：連班到第6天了但沒空格可插，只能繼續，
          // 實際上因為排班時受 weekWorked 限制（每週最多6天），理論上不會超過
        }
      }
    }
  });

  // 每店累積派遣天數（平均分配用）
  const storeAssigned={};
  storeList.forEach(st=>{storeAssigned[st.id]={}});

  // ── [修正G·v8] 店家月時數控管 ──
  // 派員1.5 的店，dailyMax=2 等於每天都派2人 → 實際變成派員2.0（睡衣 127% 超標）
  // v8：追蹤每店累積服勤時數，依「月時數上限 × 進度」配速，超過配額當天就不再補人
  const storeHoursUsed={};
  const storeHoursCap={};
  storeList.forEach(st=>{
    storeHoursUsed[st.id]=0;
    storeHoursCap[st.id]=storeHoursLimit(st.staffAlloc, days); // (月天數-8)×8h×派員
  });

  // ⑦ 排每天班別
  for(let d=1;d<=days;d++){
    const dow=getDOW(y,m,d);
    const weekend=dow===0||dow===6;
    const wk=Math.floor((d-1)/7);
    const pidx=getBiweeklyIdxForDay(y,m,d,periods);

    storeList.forEach(store=>{
      // 公休日跳過
      const closedDays=store.closedDOW||[];
      if(closedDays.includes(dow))return;

      // 此店今天已排班的人數
      const alreadyHere=staffList.filter(s=>ms[s.id]?.[d]?.type==='work'&&ms[s.id]?.[d]?.storeId===store.id);

      // 已有 O 班（全天）→ 不補人
      const hasFullDay=alreadyHere.some(s=>{
        const sh=STATE.shifts.find(x=>x.id===ms[s.id]?.[d]?.shiftId);
        return sh&&sh.code==='O';
      });
      if(hasFullDay)return;

      // ── [修正A] 每日人數上限：依 staffAlloc 決定 ──
      // staffAlloc<1（巴斯）: 每天最多1人，但靠月預算控制總天數
      // staffAlloc=1（正大/融辰）: 每天最多1人
      // staffAlloc>=1.5（SOGO睡衣）: 每天最多 floor(staffAlloc)+1，但受月預算限制
      const dailyMax = store.staffAlloc<1 ? 1
        : store.staffAlloc<=1 ? 1
        : Math.min(store.maxStaff||5, Math.ceil(store.staffAlloc));
      if(alreadyHere.length>=dailyMax)return;

      const need=dailyMax-alreadyHere.length;
      if(need<=0)return;

      // ── [修正F·v8] 候選池：優先固定指派，月預算「按進度配速」──
      // v7 只檢查 used>=budget，但 storeList 順序在前的店（睡衣）每天先搶人，
      // 預算用完前後面的店（巴斯）永遠輪不到。
      // v8：每天只允許用到「預算 × 月進度」，強制多店交錯排班。
      function canAssignToStore(s, storeId){
        const budget=staffMonthBudget[s.id]?.[storeId];
        if(budget!=null){
          const used=staffStoreDays[s.id]?.[storeId]||0;
          const allowedByPace=Math.ceil(budget*d/days); // 按月進度配速
          if(used>=Math.min(budget, allowedByPace)) return false;
        }
        return true;
      }

      const fixedPool=staffList.filter(s=>
        getAssignedStores(s.id).includes(store.id)&&
        canAssignBi(s,d,wk,pidx,periodWorkedH,weekWorked,ms,periods)&&
        canAssignToStore(s,store.id)
      );
      const otherPool=staffList.filter(s=>{
        if(fixedPool.find(x=>x.id===s.id))return false;
        const assigns=getAssignedStores(s.id);
        if(assigns.length>0&&!assigns.includes(store.id))return false;
        return canAssignBi(s,d,wk,pidx,periodWorkedH,weekWorked,ms,periods)&&
               canAssignToStore(s,store.id);
      });

      // ── [修正J·v8] 主力/副手模式（從人工班表提取的核心邏輯）──
      // 睡衣/莎露/平鎮大等 1<staffAlloc<2 的店：
      //   單店指派人 = 主力，全天O班覆蓋
      //   多店指派人 = 副手，只在主力公休日才過來代班
      // 這是人工排班最核心的模式，所有 staffAlloc=1.5 的店都是這樣排的。

      // 識別此店的主力（單店指派）和副手（多店指派）
      const storePrimary=fixedPool.filter(s=>getAssignedStores(s.id).length===1);
      const storeSecondary=[
        ...fixedPool.filter(s=>getAssignedStores(s.id).length>1),
        ...otherPool
      ];

      let toAssign;
      const isPrimaryMode = store.staffAlloc>1 && store.staffAlloc<2
                          && storePrimary.length>=1 && storeSecondary.length>=0;

      if(isPrimaryMode){
        // 主力/副手模式：
        // 有主力可用 → 只排主力1人（O班顧全天），不叫副手
        // 主力不可用（公休/特休/已排他店） → 排副手1人代班
        if(storePrimary.length>0){
          toAssign=storePrimary.slice(0,1);
        } else {
          // 按此店派遣次數排序，讓副手間公平分配代班天數
          storeSecondary.sort((a,b)=>
            ((storeAssigned[store.id][a.id]||0)-(storeAssigned[store.id][b.id]||0))
          );
          toAssign=storeSecondary.slice(0,1);
        }
      } else {
        // 一般模式（staffAlloc>=2 的多人店、staffAlloc<=1 的單人店）
        const pool=[...fixedPool,...otherPool];
        // 排序：單店指派優先，再比派遣次數，再比工時落後
        pool.sort((a,b)=>{
          const aMulti=getAssignedStores(a.id).length>1?1:0;
          const bMulti=getAssignedStores(b.id).length>1?1:0;
          if(aMulti!==bMulti) return aMulti-bMulti;
          return ((storeAssigned[store.id][a.id]||0)-(storeAssigned[store.id][b.id]||0))||
                 ((periodWorkedH[a.id]?.[pidx]||0)-(periodWorkedH[b.id]?.[pidx]||0));
        });
        toAssign=pool.slice(0,need);
      }

      const closeTimeStr=weekend?(store.closeWeekend||store.close):store.close;
      const closeHour=parseInt((closeTimeStr||'21:00').split(':')[0]);
      const isLateStore=closeHour>=21;
      const hasPShift=!!getShiftStartTime(store.storeNo,'P',dow);

      // ── [修正G·v8] 店時數配速：累計今天已在店的時數（鎖定格等） ──
      alreadyHere.forEach(s=>{
        storeHoursUsed[store.id]+=getCellWorkH(ms[s.id][d],store,dow);
      });
      // 本店今日時數配額 = 月上限 × 進度（已過天數/全月天數）
      const storeQuotaToday=storeHoursCap[store.id]*d/days;

      // 計算今天此店確定出勤總人數
      const totalOut=alreadyHere.length+toAssign.length;

      // 雙週工時上限（供超標防護用）
      const periodObj=periods.find(p=>p.idx===pidx);
      const periodLen=periodObj?periodObj.days.length:14;
      const periodMaxH=Math.round(periodLen/14*80);
      const posInPeriod=periodObj?(periodObj.days.indexOf(d)+1):1;

      let assignedCount=0;
      for(const s of toAssign){
        // [修正G·v8] 店時數配速：主力模式已限1人/天，不需配速限制
        if(!isPrimaryMode){
          const outNow=alreadyHere.length+assignedCount;
          if(outNow>=(store.minDaily||1) && storeHoursUsed[store.id]>=storeQuotaToday) break;
        }

        let shiftCode;
        const hasOShift=!!getShiftStartTime(store.storeNo,'O',dow);

        if(!isLateStore){
          shiftCode='A';
        } else if(isPrimaryMode){
          // ── [修正J·v8] 主力/副手模式的班別邏輯 ──
          // 人工班表規律：staffAlloc 1~2 的店，不管主力或副手，
          // 獨自覆蓋時一律 O 班（全天顧店）
          const othersHere=alreadyHere.length+assignedCount;
          if(othersHere===0 && hasOShift){
            shiftCode='O'; // 獨自覆蓋 → O班顧全天
          } else if(hasPShift){
            // 罕見：主力+副手同天出勤（人手充足日）→ A/P互補
            const todayShifts=staffList
              .filter(x=>ms[x.id]?.[d]?.type==='work'&&ms[x.id]?.[d]?.storeId===store.id)
              .map(x=>STATE.shifts.find(sh=>sh.id===ms[x.id]?.[d]?.shiftId)?.code)
              .filter(Boolean);
            shiftCode=todayShifts.includes('A')?'P':'A';
          } else {
            shiftCode='A';
          }
        } else if(totalOut===1&&store.staffAlloc>1){
          // 多人店今天只有1人出勤 → O班
          shiftCode='O';
        } else if(!hasPShift){
          shiftCode='A';
        } else if(store.staffAlloc<1){
          // staffAlloc<1（巴斯等）→ P/A交替
          const prev=getPrevShift(s.id,d,ms);
          shiftCode=(prev==='P')?'A':'P';
        } else {
          // ── [修正E] A/P互補：即時讀 ms 已寫入的班別 ──
          const todayShifts=staffList
            .filter(x=>ms[x.id]?.[d]?.type==='work'&&ms[x.id]?.[d]?.storeId===store.id)
            .map(x=>STATE.shifts.find(sh=>sh.id===ms[x.id]?.[d]?.shiftId)?.code)
            .filter(Boolean);
          const hasA=todayShifts.includes('A');
          const hasP=todayShifts.includes('P');
          if(hasA&&!hasP) shiftCode='P';
          else if(hasP&&!hasA) shiftCode='A';
          else {
            // ── [修正H·v8] 自由選班時改用「雙週工時配速」──
            // v7 用前一班交替，導致有人連吃太多10h的A班，8天就撞80h上限，
            // 後段整片變公休（大江公休超過、月工時僅131~147h的主因）。
            // v8：落後配速 → 排長班(A)；超前配速 → 排短班(P)，
            //     讓每人雙週平均約 7.5h/天，可上滿 10~11 天。
            const pace=periodMaxH*posInPeriod/periodLen;
            shiftCode=((periodWorkedH[s.id]?.[pidx]||0)>=pace)?'P':'A';
          }
        }

        let shiftObj=STATE.shifts.find(x=>x.code===shiftCode)||STATE.shifts[0];
        let cell={type:'work',storeId:store.id,shiftId:shiftObj?.id||'s1'};
        let actualHours=getCellWorkH(cell,store,dow);

        // ── [修正H·v8] 雙週80h硬上限防護：排下去會超標就改短班，仍超標就跳過 ──
        const curPeriodH=periodWorkedH[s.id]?.[pidx]||0;
        if(curPeriodH+actualHours>periodMaxH){
          if(hasPShift&&shiftCode!=='P'){
            const pObj=STATE.shifts.find(x=>x.code==='P');
            if(pObj){
              const pCell={type:'work',storeId:store.id,shiftId:pObj.id};
              const pH=getCellWorkH(pCell,store,dow);
              if(curPeriodH+pH<=periodMaxH){
                shiftObj=pObj; cell=pCell; actualHours=pH;
              } else continue; // 連P班都放不下 → 跳過此人（之後變公休）
            } else continue;
          } else continue;
        }

        // ── [修正E] 立即寫入 ms，讓後續人員能讀到正確班別 ──
        ms[s.id][d]=cell;
        periodWorkedH[s.id][pidx]=(periodWorkedH[s.id][pidx]||0)+actualHours;
        weekWorked[`${s.id}_${wk}`]=(weekWorked[`${s.id}_${wk}`]||0)+1;
        storeAssigned[store.id][s.id]=(storeAssigned[store.id][s.id]||0)+1;
        storeHoursUsed[store.id]+=actualHours; // [修正G·v8] 店時數累計
        // 月預算追蹤
        if(!staffStoreDays[s.id][store.id]) staffStoreDays[s.id][store.id]=0;
        staffStoreDays[s.id][store.id]++;
        assignedCount++;
      }

      // ── [修正G·v8] 孤班轉O：配額/80h防護砍掉第二人後，
      // 多人店今天只剩1人且排的是A或P（半天班）→ 改成O班顧全天
      if(isLateStore&&store.staffAlloc>1){
        const workersToday=staffList.filter(s=>ms[s.id]?.[d]?.type==='work'&&ms[s.id]?.[d]?.storeId===store.id);
        if(workersToday.length===1){
          const lone=workersToday[0];
          const c=ms[lone.id][d];
          const sh=STATE.shifts.find(x=>x.id===c.shiftId);
          if(sh&&(sh.code==='A'||sh.code==='P')&&!c.locked){
            const oObj=STATE.shifts.find(x=>x.code==='O');
            if(oObj){
              const oldH=getCellWorkH(c,store,dow);
              const oCell={type:'work',storeId:store.id,shiftId:oObj.id};
              const oH=getCellWorkH(oCell,store,dow);
              const curH=periodWorkedH[lone.id]?.[pidx]||0;
              // 換成O班不會超過雙週上限才換
              if(curH-oldH+oH<=periodMaxH){
                ms[lone.id][d]=oCell;
                periodWorkedH[lone.id][pidx]=curH-oldH+oH;
                storeHoursUsed[store.id]+=oH-oldH;
              }
            }
          }
        }
      }
    });

    // 沒有安排的格子 → 公休
    staffList.forEach(s=>{if(!ms[s.id][d])ms[s.id][d]={type:'off'}});
  }
  return ms;
}

function autoSchedule(y,m){getAllGroups().forEach(g=>autoScheduleGroup(y,m,g.id));}

function getPrevShift(staffId,day,ms){
  for(let d=day-1;d>=1;d--){
    const c=ms[staffId]?.[d];
    if(c&&c.type==='work'&&c.shiftId){
      const sh=STATE.shifts.find(x=>x.id===c.shiftId);
      if(sh) return sh.code;
    }
  }
  return null;
}

// 雙週版本的可排班判斷
function canAssignBi(s,d,wk,pidx,periodWorkedH,weekWorked,ms,periods){
  if(ms[s.id]?.[d])return false;
  if((weekWorked[`${s.id}_${wk}`]||0)>=6)return false;
  const periodH=periodWorkedH[s.id]?.[pidx]||0;
  const period=periods.find(p=>p.idx===pidx);
  // 雙週工時上限：完整雙週 80h（10天×8h），跨月週期等比
  const maxH=period?Math.round((period.days.length/14)*80):80;
  if(periodH>=maxH)return false;
  return true;
}

function showPage(page,extra){
  STATE.currentPage=page;
  autoSave();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById(`nav-${page}`);
  if(nav)nav.classList.add('active');
  renderNavGroups(); // 動態更新組別導覽
  const main=document.getElementById('main-content');
  // 動態判斷是否為組別班表頁
  if(page.startsWith('schedule-')&&page!=='schedule-all'){
    const gid=page.replace('schedule-','');
    const group=getGroupById(gid);
    if(group){ main.innerHTML=renderScheduleGroup(gid); return; }
  }
  switch(page){
    case 'dashboard':    main.innerHTML=renderDashboard();break;
    case 'schedule-all': main.innerHTML=renderScheduleAll();break;
    case 'store-view':   main.innerHTML=renderStoreView();break;
    case 'staff-view':   main.innerHTML=renderStaffView();break;
    case 'history':      main.innerHTML=renderHistory(extra);break;
    case 'staff':        main.innerHTML=renderStaff();break;
    case 'stores':       main.innerHTML=renderStores();break;
    case 'groups':       main.innerHTML=renderGroups();break;
    case 'assign':       main.innerHTML=renderAssign();break;
    case 'special':      main.innerHTML=renderSpecial();break;
    case 'settings':     main.innerHTML=renderSettings();break;
    default: main.innerHTML=renderDashboard();
  }
}

function buildSchedTable(staffList,y,m,editable=true){
  const days=daysInMonth(y,m);
  const ms=getMS(y,m);
  const periods=getBiweeklyPeriods(y,m);

  // 日期表頭（雙週分隔用不同背景）
  const dHeaders=[];
  for(let d=1;d<=days;d++){
    const dow=getDOW(y,m,d);
    const pidx=getBiweeklyIdxForDay(y,m,d,periods);
    const isNewPeriod=d>1&&getBiweeklyIdxForDay(y,m,d-1,periods)!==pidx;
    const weekend=dow===0||dow===6;
    let bg=pidx%2===0?'#EAF4FB':''; // 偶數雙週淡藍底
    if(weekend)bg=pidx%2===0?'#D6EAF8':'#EEE8F0';
    const borderLeft=isNewPeriod?'border-left:3px solid var(--accent)!important;':'';
    dHeaders.push(`<th class="${weekend?'dh-weekend':''}" style="min-width:26px;${bg?`background:${bg};`:''}${borderLeft}">${d}<br><span style="font-size:9px">${DAY_NAMES[dow]}</span></th>`);
  }

  const warnings=[];
  const rows=staffList.map(s=>{
    const sd=ms[s.id]||{};
    // 各雙週工時
    const pHours={};
    periods.forEach(p=>{
      let h=0;
      p.days.forEach(d=>{
        const c=sd[d];
        if(c&&c.type==='work'&&c.shiftId){const stx=STATE.stores.find(q=>q.id===c.storeId);const dwx=getDOW(y,m,d);h+=getCellWorkH(c,stx,dwx);}
      });
      pHours[p.idx]=h;
    });

    const totalH=Object.values(pHours).reduce((a,b)=>a+b,0);
    const cells=[];
    for(let d=1;d<=days;d++){
      const c=sd[d];
      const pidx=getBiweeklyIdxForDay(y,m,d,periods);
      const isNewPeriod=d>1&&getBiweeklyIdxForDay(y,m,d-1,periods)!==pidx;
      const borderStyle=isNewPeriod?'border-left:3px solid var(--accent)!important;':'';
      const cell=editable?renderCell(c,s.id,d,y,m,borderStyle):renderCellReadonly(c,borderStyle);
      cells.push(cell);
    }

    // 各雙週工時標籤
    const pHoursLabel=periods.map(p=>{
      const h=pHours[p.idx]||0;
      const maxH=Math.min(80,p.days.length*8);
      const cls=h>maxH?'color:var(--danger);font-weight:700':h>=maxH*0.9?'color:var(--success)':'color:var(--warn)';
      return `<span style="font-size:10px;${cls}" title="${p.label}">${h}h</span>`;
    }).join('<span style="color:var(--border);margin:0 2px">│</span>');

    if(Object.values(pHours).some(h=>h>80))
      warnings.push(`<span style="color:var(--danger)">⚠ ${s.name}：雙週超時</span>`);

    const overallCls=Object.values(pHours).some(h=>h>80)?'over':'ok';
    const totalHDisp=`<span style="font-size:11px;font-weight:700">${totalH}h</span>`;
    return `<tr>
      <td class="col-name">${s.empNo?`<span style="font-size:9px;color:var(--text2);display:block">${s.empNo}</span>`:''}${s.name}${s.role==='leader'?'<br><span style="font-size:9px;color:var(--accent2)">組長</span>':''}</td>
      ${cells.join('')}
      <td class="col-hours ${overallCls}" style="min-width:72px;line-height:1.8">${pHoursLabel}<br>${totalHDisp}</td>
    </tr>`;
  });
  return {dHeaders,rows,warnings,periods};
}

// ── 貞文組 / 秋玉組 班表（排班作業頁）──
function renderScheduleGroup(gid){
  const y=STATE.currentYear,m=STATE.currentMonth;
  const ms=getMS(y,m);
  const group=getGroupById(gid)||{name:gid,color:'var(--accent)'};
  const groupLabel=group.name;
  const groupColor=group.color;
  const staffList=STATE.staff.filter(s=>s.groupId===gid);
  const hasData=staffList.some(s=>Object.keys(ms[s.id]||{}).length>0);
  const nav=monthNav(
    `changeMonthGroup('${gid}',-1)`,
    `changeMonthGroup('${gid}',1)`,
    y,m
  );

  if(!hasData) return `
    <div class="page-header">
      <div><div class="page-title" style="color:${groupColor}">📅 ${groupLabel} 排班作業</div><div class="page-sub">${y}年${m}月</div></div>
    </div>
    ${nav}
    <div class="alert alert-info">ℹ️ 本月尚未排班，請執行「自動排班」。</div>
    <button class="btn btn-success" onclick="runAutoScheduleGroup('${gid}')">✨ ${groupLabel} 自動排班</button>`;

  const {dHeaders,rows,warnings,periods}=buildSchedTable(staffList,y,m,true);

  // 雙週工時摘要（各人雙週達標狀況）
  const biSummary=staffList.filter(s=>s.status==='active'||!s.status).map(s=>{
    const sd=ms[s.id]||{};
    const pHours={};
    periods.forEach(p=>{pHours[p.idx]=0});
    for(let d=1;d<=daysInMonth(y,m);d++){
      const c=sd[d];
      if(c&&c.type==='work'){
        const sh=STATE.shifts.find(x=>x.id===c.shiftId);
        const stx=STATE.stores.find(q=>q.id===c?.storeId);const dwx=getDOW(y,m,d);const h=getCellWorkH(c,stx,dwx);
        const pidx=getBiweeklyIdxForDay(y,m,d,periods);
        pHours[pidx]=(pHours[pidx]||0)+h;
      }
    }
    const labels=periods.map(p=>{
      const h=pHours[p.idx]||0;
      const maxH=Math.min(80,p.days.length*8);
      const ok=h>=maxH;
      return `<span style="font-size:10px;padding:1px 5px;border-radius:8px;background:${ok?'#EAFAF1':'#FEF9E7'};color:${ok?'#1E8449':'#B7950B'}">${p.idx}: ${h}/${maxH}h${ok?'✅':'⚠️'}</span>`;
    }).join(' ');
    return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="min-width:70px;font-size:12px;font-weight:600">${s.name}</span>${labels}
    </div>`;
  }).join('');

  // 店時數摘要
  const storeStatus=getStoreHoursStatus(y,m).filter(x=>x.store.groupId===gid);
  const overStores=storeStatus.filter(x=>x.status==='over');
  const underStores=storeStatus.filter(x=>x.status==='under'&&x.actual>0);

  return `
  <div class="page-header">
    <div>
      <div class="page-title" style="color:${groupColor}">📅 ${groupLabel} 排班作業</div>
      <div class="page-sub">${y}年${m}月</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-success" onclick="runAutoScheduleGroup('${gid}')">✨ 重新自動排班</button>
      <button class="btn btn-primary" onclick="showPage('store-view')">🏪 看店家視角</button>
      <button class="btn btn-primary" onclick="showPage('staff-view')">👤 看人員視角</button>
      <button class="btn btn-outline" onclick="exportExcelGroup('${gid}')">⬇ Excel</button>
    </div>
  </div>
  ${nav}

  ${warnings.length?`<div class="alert alert-warn">⚠️ 人員工時異常：${warnings.join('　')}</div>`:''}
  ${overStores.length?`<div class="alert alert-danger">🚫 店時數超標：${overStores.map(x=>`${x.store.name}（${x.actual}h / 上限${x.limit}h）`).join('　')}</div>`:''}
  ${underStores.length?`<div class="alert alert-warn">⚠️ 店時數不足：${underStores.map(x=>`${x.store.name}（${x.actual}h / 目標${x.limit}h，${x.pct}%）`).join('　')}</div>`:''}

  <div class="card" style="padding:12px;margin-bottom:12px">
    <div class="card-title" style="margin-bottom:8px">📊 雙週工時達標狀況</div>
    ${biSummary}
  </div>

  <div class="card" style="padding:12px;margin-bottom:12px">
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${storeStatus.filter(x=>x.limit>0).map(x=>{
        const color=x.status==='over'?'#FDECEA':x.status==='ok'?'#EAFAF1':'#FEF9E7';
        const border=x.status==='over'?'#F1948A':x.status==='ok'?'#82E0AA':'#F9CA74';
        const icon=x.status==='over'?'🚫':x.status==='ok'?'✅':'⚠️';
        return `<span style="font-size:11px;padding:3px 10px;border-radius:10px;background:${color};border:1px solid ${border}">
          ${icon} ${x.store.name.replace(/中壢|平鎮|楊梅|內壢|龍潭/,'').substring(0,5)} ${x.actual}/${x.limit}h
        </span>`;
      }).join('')}
    </div>
  </div>

  <details style="margin-bottom:16px">
    <summary style="cursor:pointer;padding:8px 12px;background:var(--surface2);border-radius:8px;font-size:13px;font-weight:600;user-select:none">
      📋 展開班表格（可點格子手動調整）
    </summary>
    <div style="margin-top:8px">
      <div class="alert alert-info" style="font-size:11px">💡 主要調整請在「店家視角」或「人員視角」直接操作，更直覺。此處班表格可作快速確認用。</div>
      ${schedLegend(true)}
      <div style="overflow-x:auto">
        <table class="sg">
          <thead><tr><th class="col-name">姓名</th>${dHeaders.join('')}<th class="col-hours">工時</th></tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>
    </div>
  </details>`;
}

// ==================== 店家視角 ====================
function renderStoreView(){
  const y=STATE.currentYear, m=STATE.currentMonth;
  const days=daysInMonth(y,m);
  const ms=STATE.schedules[schedKey(y,m)]||{};
  const periods=getBiweeklyPeriods(y,m);
  const stdH=y===2026&&m===5?184:daysInMonth(y,m)===31?184:176;

  const nav=`<div class="month-nav">
    <button class="btn btn-outline btn-sm" onclick="changeMonth(-1);showPage('store-view')">◀ 上月</button>
    <span class="month-label">${y}年${m}月</span>
    <button class="btn btn-outline btn-sm" onclick="changeMonth(1);showPage('store-view')">下月 ▶</button>
  </div>`;

  // 依登入角色過濾店家
  const r=STATE.login.role;
  let storeOptions=STATE.stores.filter(s=>s.groupId!=='office');
  if(r==='leader'&&STATE.login.groupId){
    storeOptions=storeOptions.filter(s=>s.groupId===STATE.login.groupId);
  }

  const selId=STATE._storeViewSelected||(storeOptions[0]?.id);
  STATE._storeViewSelected=selId;
  const store=STATE.stores.find(x=>x.id===selId);

  const selectHtml=`<select onchange="STATE._storeViewSelected=this.value;showPage('store-view')" style="font-size:14px;padding:6px 10px;border:1px solid var(--border);border-radius:6px">
    ${storeOptions.map(st=>`<option value="${st.id}" ${st.id===selId?'selected':''}>${st.isTemp?'⚡':''}${st.storeNo} ${st.name}（${CHANNEL_NAMES[st.channel]||''}）派員${st.staffAlloc}</option>`).join('')}
  </select>`;

  if(!store) return `<div class="page-header"><div><div class="page-title">🏪 店家視角</div></div></div>${nav}<div class="alert alert-info">請選擇店家</div>`;

  const hasData=STATE.staff.some(s=>Object.keys(ms[s.id]||{}).length>0);
  if(!hasData) return `
    <div class="page-header">
      <div><div class="page-title">🏪 店家視角</div></div>
      <div style="display:flex;gap:8px;align-items:center">${selectHtml}</div>
    </div>
    ${nav}<div class="alert alert-info">ℹ️ 尚無班表資料，請先執行自動排班。</div>`;

  // 找出在此店有班的員工
  const staffAtStore=STATE.staff.filter(s=>
    Object.values(ms[s.id]||{}).some(c=>c&&c.type==='work'&&c.storeId===store.id)
  );

  // 日期標題（05-01 格式）
  const dateHeaders=[];
  for(let d=1;d<=days;d++){
    const dow=getDOW(y,m,d);
    const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
    const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;
    const weekend=dow===0||dow===6;
    const bg=weekend?(pidx%2===0?'#D6EAF8':'#DDD0E8'):(pidx%2===0?'#EAF4FB':'');
    const bl=isNewP?'border-left:3px solid var(--accent);':'';
    dateHeaders.push(`<th style="min-width:26px;font-size:9px;background:${bg};${bl}padding:2px 1px;text-align:center">${m.toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}</th>`);
  }

  // 星期行
  const dowCells=[];
  for(let d=1;d<=days;d++){
    const dow=getDOW(y,m,d);
    const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
    const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;
    const weekend=dow===0||dow===6;
    const bg=weekend?(pidx%2===0?'#D6EAF8':'#DDD0E8'):(pidx%2===0?'#EAF4FB':'');
    const bl=isNewP?'border-left:3px solid var(--accent);':'';
    dowCells.push(`<td style="text-align:center;font-size:10px;background:${bg};${bl}padding:2px">${DAY_NAMES[dow]}</td>`);
  }

  // 每個員工產生一個區塊
  const staffBlocks=staffAtStore.map((s,si)=>{
    const sd=ms[s.id]||{};
    const assignedStore=STATE.stores.find(x=>getAssignedStores(s.id).includes(x.id)&&x.id===store.id)||store;

    // 統計
    let workH=0,mealH=0,workDays=0,offDays=0,leaveDays=0,otDays=0;
    const notesData=STATE.storeViewNotes?.[`${store.id}_${s.id}_${schedKey(y,m)}`]||{};

    for(let d=1;d<=days;d++){
      const c=sd[d];
      if(!c||c.type==='off') offDays++;
      else if(c.type==='leave') leaveDays++;
      else if(c.type==='work'&&c.storeId===store.id){
        const sh=STATE.shifts.find(x=>x.id===c.shiftId);
        const stx2=STATE.stores.find(q=>q.id===store.id);const dwx2=getDOW(y,m,d);workDays++;workH+=getCellWorkH(c,stx2,dwx2);mealH+=getCellMealH(c,stx2,dwx2);
      }
    }

    // 班別行
    const shiftCells=[];
    for(let d=1;d<=days;d++){
      const c=sd[d];
      const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
      const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;
      const bl=isNewP?'border-left:3px solid var(--accent);':'';
      const dow=getDOW(y,m,d);
      const weekend=dow===0||dow===6;
      const bgBase=weekend?(pidx%2===0?'#D6EAF8':'#DDD0E8'):(pidx%2===0?'#EAF4FB':'');
      const editBtn=`onclick="openCellEdit('${s.id}',${d},${y},${m},'store-view')" title="點擊修改班別" style="cursor:pointer;"`;
      if(!c||c.type==='off'){
        shiftCells.push(`<td ${editBtn} style="${bl}text-align:center;font-size:11px;font-weight:700;background:var(--shift-off);color:#9B8B7E;padding:2px">X</td>`);
      } else if(c.type==='leave'){
        shiftCells.push(`<td ${editBtn} style="${bl}text-align:center;font-size:11px;font-weight:700;background:var(--shift-leave);color:#C0392B;padding:2px">特</td>`);
      } else if(c.type==='meeting'){
        shiftCells.push(`<td ${editBtn} style="${bl}text-align:center;font-size:11px;font-weight:700;background:var(--shift-meeting);color:#7D3C98;padding:2px">會</td>`);
      } else if(c.type==='training'){
        shiftCells.push(`<td ${editBtn} style="${bl}text-align:center;font-size:11px;font-weight:700;background:var(--shift-meeting);color:#7D3C98;padding:2px">訓</td>`);
      } else if(c.type==='work'){
        const sh=STATE.shifts.find(x=>x.id===c.shiftId);
        const code=sh?.code||'?';
        const bg=code==='A'?'var(--shift-a)':code==='P'?'var(--shift-p)':code==='O'?'var(--shift-o)':code==='B'?'var(--shift-b)':code==='C'?'var(--shift-c)':bgBase;
        // 如果不是這間店，灰顯
        const notThisStore=c.storeId!==store.id;
        const otherStore=notThisStore?STATE.stores.find(x=>x.id===c.storeId):null;
        const otherName=otherStore?otherStore.name.replace(/中壢|平鎮|楊梅|內壢|龍潭/,'').substring(0,3):'';
        if(notThisStore){
          shiftCells.push(`<td onclick="openCellEdit('${s.id}',${d},${y},${m},'store-view')" title="點擊修改班別（目前在${otherStore?.name||'其他店'}）" style="${bl}text-align:center;font-size:9px;background:#F0F0F0;color:#AAA;padding:2px;cursor:pointer">${code}<br>${otherName}</td>`);
        } else {
          shiftCells.push(`<td onclick="openCellEdit('${s.id}',${d},${y},${m},'store-view')" title="點擊修改班別" style="${bl}text-align:center;font-size:11px;font-weight:700;background:${bg};padding:2px;cursor:pointer">${code}</td>`);
        }
      }
    }

    // 服勤時間行
    const workTimeCells=[];
    for(let d=1;d<=days;d++){
      const c=sd[d];
      const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
      const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;
      const bl=isNewP?'border-left:3px solid var(--accent);':'';
      if(c&&c.type==='work'&&c.storeId===store.id){
        const sh=STATE.shifts.find(x=>x.id===c.shiftId);
        const stx3=STATE.stores.find(q=>q.id===c?.storeId);const dwx3=getDOW(y,m,d);const h=getCellWorkH(c,stx3,dwx3);
        workTimeCells.push(`<td style="${bl}text-align:center;font-size:11px;background:#F9F9F9;padding:2px">${h}</td>`);
      } else {
        workTimeCells.push(`<td style="${bl}background:#F9F9F9;padding:2px"></td>`);
      }
    }

    // 用餐行
    const mealCells=[];
    for(let d=1;d<=days;d++){
      const c=sd[d];
      const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
      const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;

        mealCells.push(`<td style="${bl}text-align:center;font-size:11px;background:#F9F9F9;padding:2px">0.5</td>`);
      } else {
        mealCells.push(`<td style="${bl}background:#F9F9F9;padding:2px"></td>`);
      }
    }

    // 代班行（可編輯）
    const deputyCells=[];
    for(let d=1;d<=days;d++){
      const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
      const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;

      const bl=isNewP?'border-left:3px solid var(--accent);':'';
      const val=notesData[`sup_${d}`]||'';
      supportCells.push(`<td style="${bl}padding:1px;background:#FDFDF8"><input value="${val}" style="width:100%;font-size:9px;border:none;background:transparent;text-align:center;padding:1px" onchange="saveStoreNote('${store.id}','${s.id}','${schedKey(y,m)}','sup_${d}',this.value)"></td>`);
    }

    // 備註說明行（可編輯）

    for(let d=1;d<=days;d++){
      const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
      const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;

// 儲存備註
function saveStoreNote(storeId,staffId,monthKey,field,value){
  if(!STATE.storeViewNotes) STATE.storeViewNotes={};
  const key=`${storeId}_${staffId}_${monthKey}`;
  if(!STATE.storeViewNotes[key]) STATE.storeViewNotes[key]={};
  STATE.storeViewNotes[key][field]=value;
  autoSave(); // 備註即時儲存
}

// 人員視角代班儲存：存到 staffdep key，同時同步到對應店家的代班欄
function saveStaffDep(staffId,monthKey,field,value){
  if(!STATE.storeViewNotes) STATE.storeViewNotes={};
  // 1. 存到人員視角專屬 key
  const staffKey=`staffdep_${staffId}_${monthKey}`;
  if(!STATE.storeViewNotes[staffKey]) STATE.storeViewNotes[staffKey]={};
  STATE.storeViewNotes[staffKey][field]=value;
  // 2. 同步到該員工當天所在店家的代班欄（雙向連動）
  const parts=monthKey.split('-');
  if(parts.length>=2){
    const y=parseInt(parts[0]),m=parseInt(parts[1]);
    const dayNum=parseInt((field||'').replace('dep_',''));
    if(dayNum>0){
      const ms=getMS(y,m);
      const c=(ms[staffId]||{})[dayNum];
      if(c&&c.type==='work'&&c.storeId){
        const storeKey=`${c.storeId}_${staffId}_${monthKey}`;
        if(!STATE.storeViewNotes[storeKey]) STATE.storeViewNotes[storeKey]={};
        STATE.storeViewNotes[storeKey][field]=value;
      }
    }
  }
  autoSave();
}

// 唯讀格子（總表用）
function renderCellReadonly(c,borderStyle=''){
  const extra=borderStyle?`style="cursor:default;${borderStyle}"`:'style="cursor:default"';
  if(!c||c.type==='off') return `<td class="cell-off" ${extra}>X</td>`;
  if(c.type==='leave') return `<td class="cell-leave" ${extra} title="特休">特</td>`;
  if(c.type==='meeting') return `<td class="cell-meeting" ${extra}>會</td>`;
  if(c.type==='training') return `<td class="cell-meeting" ${extra}>訓</td>`;
  if(c.type==='work'){
    const st=STATE.stores.find(x=>x.id===c.storeId);
    const sh=STATE.shifts.find(x=>x.id===c.shiftId);
    const nm=st?st.name.replace(/中壢|平鎮|楊梅|內壢|龍潭/,'').substring(0,4):'–';
    const code=sh?.code||sh?.name?.charAt(0)||'A';
    const cls=shiftCellClass(code);
    return `<td class="${cls}" ${extra} title="${st?.name||''}">${nm}<br><span style="font-size:9px;font-weight:700">${code}</span></td>`;
  }
  return `<td ${extra}>–</td>`;
}

function shiftCellClass(code){
  if(code==='A') return 'cell-shiftA';
  if(code==='P') return 'cell-shiftP';
  if(code==='O') return 'cell-shiftO';
  if(code==='B') return 'cell-shiftB';
  if(code==='C') return 'cell-shiftC';
  return 'cell-work';
}

function renderCell(c,staffId,day,y,m,borderStyle=''){
  const bs=borderStyle?`style="${borderStyle}"`:'';
  if(!c||c.type==='off'){
    const locked=c&&c.locked?'cell-locked':'';
    return `<td class="cell-off ${locked}" ${bs} onclick="openCellEdit('${staffId}',${day},${y},${m})" title="公休">X</td>`;
  }
  if(c.type==='leave'){
    const locked=c.locked?'cell-locked':'';
    return `<td class="cell-leave ${locked}" ${bs} onclick="openCellEdit('${staffId}',${day},${y},${m})" title="特休">特</td>`;
  }
  if(c.type==='meeting'){
    const locked=c.locked?'cell-locked':'';
    return `<td class="cell-meeting ${locked}" ${bs} onclick="openCellEdit('${staffId}',${day},${y},${m})" title="開會">會</td>`;
  }
  if(c.type==='training'){
    const locked=c.locked?'cell-locked':'';
    return `<td class="cell-meeting ${locked}" ${bs} onclick="openCellEdit('${staffId}',${day},${y},${m})" title="訓練">訓</td>`;
  }
  if(c.type==='work'){
    const st=STATE.stores.find(x=>x.id===c.storeId);
    const sh=STATE.shifts.find(x=>x.id===c.shiftId);
    const storeName=st?st.name.replace(/中壢|平鎮|楊梅|內壢|龍潭/,'').substring(0,4):'–';
    const code=sh?.code||sh?.name?.charAt(0)||'A';
    const cls=shiftCellClass(code);
    const locked=c.locked?'cell-locked':'';
    const dow2=getDOW(y,m,day);
    const workH=getCellWorkH(c,st,dow2);
    const isCustomH=c.customHours!=null;
    // 加班警示：計算此人此雙週累計工時，超過80h標橘色邊框
    const periods=getBiweeklyPeriods(y,m);
    const pidx=getBiweeklyIdxForDay(y,m,day,periods);
    const period=periods.find(p=>p.idx===pidx);
    const periodH=period?calcPeriodHours(staffId,period.periodStart,period.periodEnd):0;
    const periodMaxH=period?Math.round((period.days.length/14)*80):80;
    const isOvertime=periodH>periodMaxH;
    const overtimeStyle=isOvertime?'outline:2px solid #E67E22;outline-offset:-2px;':'';
    const hoursLabel=isCustomH?`<span style="font-size:8px;color:#E67E22;font-weight:700">${workH}h✎</span>`:'';
    const title=`${st?.name||''} ${sh?.name||''} 服勤${workH}h${isCustomH?' (手動)':'(自動)'}${isOvertime?' ⚠️雙週累計'+periodH.toFixed(1)+'h 超過'+periodMaxH+'h':''}`;
    return `<td class="${cls} ${locked}" style="${overtimeStyle}" ${bs} onclick="openCellEdit('${staffId}',${day},${y},${m})" title="${title}">${storeName}<br><span style="font-size:9px;font-weight:700">${code}</span>${hoursLabel}</td>`;
  }
  return `<td ${bs} onclick="openCellEdit('${staffId}',${day},${y},${m})">–</td>`;
}

// ── 格子手動編輯 ──
function openCellEdit(staffId,day,y,m,returnPage){
  const s=STATE.staff.find(x=>x.id===staffId);
  const ms=getMS(y,m);
  const c=(ms[staffId]||{})[day]||{type:'off'};
  const rp=returnPage||`schedule-${s?.groupId||getAllGroups()[0]?.id||'g1'}`;
  const storeOptions=STATE.stores.map(st=>
    `<option value="${st.id}" ${c.storeId===st.id?'selected':''}>${st.name}</option>`).join('');
  const shiftOptions=STATE.shifts.map(sh=>
    `<option value="${sh.id}" ${c.shiftId===sh.id?'selected':''}>${sh.name}</option>`).join('');

  // 計算預設工時（自動推算，供組長參考）
  const selStore=STATE.stores.find(x=>x.id===c.storeId);
  const selShift=STATE.shifts.find(x=>x.id===c.shiftId);
  const dow=getDOW(y,m,day);
  const autoCalc=selStore&&selShift?calcShiftHours(selStore,selShift.code,dow):{workH:'',mealH:''};
  const defaultWorkH=c.customHours!=null?c.customHours:(autoCalc.workH||'');
  const defaultMealH=c.customMeal!=null?c.customMeal:(autoCalc.mealH||'');

  showModal(`
  <div class="modal">
    <div class="modal-title">✏️ 修改班表 — ${s?.name} ${y}/${pad(m)}/${pad(day)}</div>
    <div class="alert alert-info" style="margin-bottom:12px">🔒 儲存後此格子會被鎖定，重新自動排班時不會覆蓋。</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>班別類型</label>
        <select id="ce-type" onchange="updateCellEditForm()" style="font-size:14px">
          <option value="work" ${c.type==='work'?'selected':''}>上班</option>
          <option value="off" ${c.type==='off'?'selected':''}>X公休</option>
          <option value="leave" ${c.type==='leave'?'selected':''}>特休</option>
          <option value="meeting" ${c.type==='meeting'?'selected':''}>開會</option>
          <option value="training" ${c.type==='training'?'selected':''}>教育實習</option>
        </select>
      </div>
      <div id="ce-store-group" class="form-group" ${c.type!=='work'?'style="display:none"':''}>
        <label>店家</label>
        <select id="ce-store" onchange="updateCellAutoHours('${staffId}',${day},${y},${m})">${storeOptions}</select>
      </div>
      <div id="ce-shift-group" class="form-group" ${c.type!=='work'?'style="display:none"':''}>
        <label>班別</label>
        <select id="ce-shift" onchange="updateCellAutoHours('${staffId}',${day},${y},${m})">${shiftOptions}</select>
      </div>
      <div id="ce-hours-group" class="form-group" ${c.type!=='work'?'style="display:none"':''}>
        <label>服勤時數 <span style="font-size:11px;color:var(--text2)">(自動計算，可手動覆蓋)</span></label>
        <input id="ce-workhours" type="number" step="0.5" min="0" max="16"
          value="${defaultWorkH}" placeholder="自動推算" style="width:100px">
        <span style="font-size:12px;color:var(--text2);margin-left:8px">小時</span>
      </div>
      <div id="ce-meal-group" class="form-group" ${c.type!=='work'?'style="display:none"':''}>
        <label>用餐時數 <span style="font-size:11px;color:var(--text2)">(自動計算，可手動覆蓋)</span></label>
        <input id="ce-mealhours" type="number" step="0.5" min="0" max="2"
          value="${defaultMealH}" placeholder="自動推算" style="width:100px">
        <span style="font-size:12px;color:var(--text2);margin-left:8px">小時</span>
      </div>
      <div id="ce-hours-hint" style="${c.type!=='work'?'display:none':''}grid-column:1/-1;font-size:11px;color:var(--text2);margin-top:-8px">
        💡 留空則依店家APOC自動計算；遇到加班截短（如 A班只上到 5.5h）請手動填入實際時數
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>備註</label>
        <input id="ce-note" value="${c.note||''}" placeholder="選填，例：代班來源、加班原因">
      </div>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="ce-locked" ${c.locked?'checked':''}>
        🔒 鎖定此格（重新排班不覆蓋）
      </label>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-danger btn-sm" onclick="clearCellLock('${staffId}',${day},${y},${m},'${rp}')">解除鎖定</button>
      <button class="btn btn-primary" onclick="saveCellEdit('${staffId}',${day},${y},${m},'${rp}')">儲存</button>
    </div>
  </div>`);
}

function updateCellEditForm(){
  const t=document.getElementById('ce-type').value;
  const isWork=t==='work';
  ['ce-store-group','ce-shift-group','ce-hours-group','ce-meal-group','ce-hours-hint'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=isWork?'':'none';
  });
}
function updateCellAutoHours(staffId,day,y,m){
  const storeId=document.getElementById('ce-store')?.value;
  const shiftId=document.getElementById('ce-shift')?.value;
  const whEl=document.getElementById('ce-workhours');
  const mhEl=document.getElementById('ce-mealhours');
  if(!storeId||!shiftId||!whEl||!mhEl) return;
  const store=STATE.stores.find(x=>x.id===storeId);
  const shift=STATE.shifts.find(x=>x.id===shiftId);
  if(!store||!shift) return;
  const dow=getDOW(y,m,day);
  const calc=calcShiftHours(store,shift.code,dow);
  if(!whEl.dataset.manual) whEl.value=calc.workH||'';
  if(!mhEl.dataset.manual) mhEl.value=calc.mealH||'';
}

function saveCellEdit(staffId,day,y,m,returnPage){
  const ms=getMS(y,m);
  if(!ms[staffId])ms[staffId]={};
  const type=document.getElementById('ce-type').value;
  const note=document.getElementById('ce-note').value;
  const locked=document.getElementById('ce-locked').checked;
  if(type==='work'){
    const whVal=document.getElementById('ce-workhours')?.value;
    const mhVal=document.getElementById('ce-mealhours')?.value;
    const storeId=document.getElementById('ce-store').value;
    const shiftId=document.getElementById('ce-shift').value;
    // 計算自動推算值，只有在手動值跟自動值不同時才存 customHours
    const store=STATE.stores.find(x=>x.id===storeId);
    const shift=STATE.shifts.find(x=>x.id===shiftId);
    const dow=getDOW(y,m,day);
    const auto=store&&shift?calcShiftHours(store,shift.code,dow):{workH:null,mealH:null};
    const customH=whVal!==''&&whVal!=null&&parseFloat(whVal)!==auto.workH?parseFloat(whVal):undefined;
    const customM=mhVal!==''&&mhVal!=null&&parseFloat(mhVal)!==auto.mealH?parseFloat(mhVal):undefined;
    const cell={type:'work',storeId,shiftId,note,locked};
    if(customH!=null) cell.customHours=customH;
    if(customM!=null) cell.customMeal=customM;
    ms[staffId][day]=cell;
  } else {
    ms[staffId][day]={type,note,locked};
  }
  autoSave();
  closeModal();
  const s=STATE.staff.find(x=>x.id===staffId);
  const rp=returnPage||(s?`schedule-${s.groupId}`:`schedule-${getAllGroups()[0]?.id||'g1'}`);
  showPage(rp);
}

function clearCellLock(staffId,day,y,m,returnPage){
  const ms=getMS(y,m);
  if(ms[staffId]&&ms[staffId][day])delete ms[staffId][day].locked;
  autoSave();
  closeModal();
  const s=STATE.staff.find(x=>x.id===staffId);
  const rp=returnPage||(s?`schedule-${s.groupId}`:`schedule-${getAllGroups()[0]?.id||'g1'}`);
  showPage(rp);
}

// ==================== 歷月班表 ====================
function renderHistory(viewKey){
  // 如果傳入特定月份key，直接顯示那個月
  if(viewKey&&STATE.schedules[viewKey]&&Object.keys(STATE.schedules[viewKey]).length>0){
    const [ys,ms_]=viewKey.split('-');
    const y=parseInt(ys),m=parseInt(ms_);
    return renderHistoryMonth(y,m);
  }

  // 顯示所有有資料的月份
  const keys=Object.keys(STATE.schedules).filter(k=>Object.keys(STATE.schedules[k]).length>0).sort().reverse();

  // 也顯示未來幾個月供快速導覽
  const allMonths=[];
  const now=new Date();
  for(let i=-2;i<=6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
    allMonths.push({k,y:d.getFullYear(),m:d.getMonth()+1,hasData:keys.includes(k)});
  }

  return `
  <div class="page-header"><div><div class="page-title">🗂 歷月班表</div><div class="page-sub">點選月份查看該月班表</div></div></div>
  <div class="card">
    <div class="card-title">月份選擇</div>
    <div class="history-grid">
      ${allMonths.map(({k,y,m,hasData})=>`
        <div class="history-card ${hasData?'has-data':''}" onclick="showPage('history','${k}')">
          <div class="hc-month">${y}/${pad(m)}</div>
          <div class="hc-label">${hasData?'✅ 有班表':'尚無資料'}</div>
        </div>`).join('')}
    </div>
  </div>
  ${keys.length===0?`<div class="alert alert-info">目前尚無歷史班表資料。請先排班。</div>`:''}
  `;
}

function renderHistoryMonth(y,m){
  const days=daysInMonth(y,m);
  const ms=STATE.schedules[schedKey(y,m)]||{};
  const dHeaders=[];
  for(let d=1;d<=days;d++){
    const dow=getDOW(y,m,d);
    dHeaders.push(`<th class="${dow===0||dow===6?'dh-weekend':''}" style="min-width:26px">${d}<br><span style="font-size:8px">${DAY_NAMES[dow]}</span></th>`);
  }
  const rows=STATE.staff.map(s=>{
    const sd=ms[s.id]||{};
    let totalH=0;
    const cells=[];
    for(let d=1;d<=days;d++){
      const c=sd[d];
      cells.push(renderCell(c,s.id,d,y,m));
      if(c&&c.type==='work'&&c.shiftId){const stxb=STATE.stores.find(q=>q.id===c.storeId);const dwxb=getDOW(y,m,d);totalH+=getCellWorkH(c,stxb,dwxb);}
    }
    const hCls=totalH>80?'over':totalH>=72?'ok':'under';
    return `<tr><td class="col-name">${s.name}</td>${cells.join('')}<td class="col-hours ${hCls}">${totalH}h</td></tr>`;
  });

  return `
  <div class="page-header">
    <div><div class="page-title">🗂 ${y}年${m}月 班表</div></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="showPage('history')">← 返回月份列表</button>
      <button class="btn btn-outline" onclick="exportExcelMonth(${y},${m},null)">⬇ Excel</button>
      <button class="btn btn-outline" onclick="window.print()">⬇ PDF</button>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:var(--shift-work)"></div>上班</div>
    <div class="legend-item"><div class="legend-box" style="background:var(--shift-off)"></div>X公休</div>
    <div class="legend-item"><div class="legend-box" style="background:var(--shift-leave)"></div>特休</div>
    <div class="legend-item"><div class="legend-box" style="background:var(--shift-meeting)"></div>開會/訓練</div>
  </div>
  <div style="overflow-x:auto">
    <table class="sg">
      <thead><tr><th class="col-name">姓名</th>${dHeaders.join('')}<th class="col-hours">工時</th></tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>
  </div>`;
}
