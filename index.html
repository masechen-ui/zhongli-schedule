function addGroup(){
  const name=document.getElementById('m-gname').value.trim();
  if(!name)return alert('請輸入組名');
  const color=document.getElementById('m-gcolor').value;
  const id=genGroupId();
  // 取得選中的組長
  const selectedLeaders=Array.from(document.querySelectorAll('.m-gleader:checked')).map(c=>c.value);
  STATE.groups.push({id,name,leaderEmpNos:[],color});
  // 將選中的組長改為此組
  selectedLeaders.forEach(sid=>{
    const s=STATE.staff.find(x=>x.id===sid);
    if(s){ s.groupId=id; s.role='leader'; }
  });
  autoSave();
  closeModal();
  showPage('groups');
  showToast(`✅ 已新增「${name}」${selectedLeaders.length?`，指派了 ${selectedLeaders.length} 位組長`:'，請至人員管理指派組長'}`);
}

function openEditGroupModal(gid){
  const g=getGroupById(gid);if(!g)return;
  // 目前這個組的組長
  const currentLeaders=STATE.staff.filter(s=>s.groupId===gid&&s.role==='leader');
  const currentLeaderIds=currentLeaders.map(s=>s.id);
  showModal(`<div class="modal">
    <div class="modal-title">編輯組別：${g.name}</div>
    <div class="form-grid">
      <div class="form-group"><label>組名</label><input id="m-gname" value="${g.name}"></div>
      <div class="form-group"><label>代表色</label><input id="m-gcolor" type="color" value="${g.color}" style="width:100%;height:38px;padding:2px;border-radius:6px;border:1px solid var(--border)"></div>
    </div>
    <div class="form-group" style="margin-top:12px">
      <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px">組長（可複選）</label>
      ${groupLeaderCheckboxes(gid, currentLeaderIds)}
    </div>
    <div class="alert alert-info" style="font-size:11px;margin-top:8px">
      💡 取消勾選的組長會保留在此組，但角色不變。若要將組長移至其他組，請至「人員管理」修改所屬組。
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="editGroup('${gid}')">儲存</button>
    </div>
  </div>`);
}

function editGroup(gid){
  const g=getGroupById(gid);if(!g)return;
  g.name=document.getElementById('m-gname').value.trim()||g.name;
  g.color=document.getElementById('m-gcolor').value;
  // 更新組長指派：勾選的設為組長，取消的保留但不改角色
  const selectedLeaderIds=Array.from(document.querySelectorAll('.m-gleader:checked')).map(c=>c.value);
  selectedLeaderIds.forEach(sid=>{
    const s=STATE.staff.find(x=>x.id===sid);
    if(s){ s.groupId=gid; s.role='leader'; s.excludeAuto=true; }
  });
  autoSave();
  closeModal();
  showPage('groups');
  showToast(`✅ 組別「${g.name}」已更新`);
}

function deleteGroup(gid){
  const g=getGroupById(gid);if(!g)return;
  const staffCount=STATE.staff.filter(s=>s.groupId===gid).length;
  const storeCount=STATE.stores.filter(s=>s.groupId===gid).length;
  if(staffCount>0||storeCount>0){
    if(!confirm(`「${g.name}」底下還有 ${staffCount} 位人員和 ${storeCount} 間店家。\n刪除後這些人員和店家的所屬組會變為空白，需手動重新指派。\n確定要刪除嗎？`))return;
    STATE.staff.filter(s=>s.groupId===gid).forEach(s=>s.groupId='');
    STATE.stores.filter(s=>s.groupId===gid).forEach(s=>s.groupId='');
  } else {
    if(!confirm(`確定要刪除「${g.name}」嗎？`))return;
  }
  STATE.groups=STATE.groups.filter(x=>x.id!==gid);
  autoSave();
  showPage('groups');
  showToast(`已刪除組別「${g.name}」`,'warn');
}

        <td>${wd}天</td>
        <td style="font-size:11px">${assigns.length?assigns.map(id=>{const st=STATE.stores.find(x=>x.id===id);return st?`<span class="assign-tag">${st.name.substring(0,5)}</span>`:''}).join(''):'–'}</td>

function renderSettings(){
  const y=STATE.currentYear, m=STATE.currentMonth;
  const periods=getBiweeklyPeriods(y,m);

  // 全年各月雙週起始一覽
  const yearRows=[];
  for(let mo=1;mo<=12;mo++){
    const key=`${y}-${pad(mo)}`;
    const anchor=getAnchorDate(y,mo);
    const overrideDate=STATE.biweeklyOverrides[key]||'';
    const ps=getBiweeklyPeriods(y,mo);
    const pLabel=ps.map(p=>`第${p.idx}週(${p.periodStart.getMonth()+1}/${p.periodStart.getDate()}~${p.periodEnd.getMonth()+1}/${p.periodEnd.getDate()})`).join('、');

      <td>${y}年${mo}月</td>
      <td style="font-size:11px;color:var(--text2)">${pLabel}</td>
      <td>
        <input type="date" value="${overrideDate||anchor.toISOString().split('T')[0]}"

            return ['A','P','O','C'].map((code,ci)=>{
              const rowTimes=times[code]||{};
              const bg=code==='A'?'var(--shift-a)':code==='P'?'var(--shift-p)':code==='O'?'var(--shift-o)':'var(--shift-c)';
              const nameCell=ci===0?`<td rowspan="4" style="padding:4px 8px;border:1px solid var(--border);font-weight:600;vertical-align:middle;white-space:nowrap">${st.storeNo}<br>${st.name}</td>`:'';
              return `<tr>${nameCell}
                <td style="padding:3px 6px;border:1px solid var(--border);background:${bg};font-weight:700">${code}</td>
                ${DOW_MAP.map(dk=>`<td style="padding:3px 6px;border:1px solid var(--border);text-align:center;font-size:11px">${rowTimes[dk]||'–'}</td>`).join('')}
              </tr>`;
            }).join('');
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">資料管理</div>
    <div id="storage-info" style="font-size:12px;color:var(--text2);margin-bottom:10px"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-success" onclick="pushToCloud()">☁️ 推送本機資料到雲端</button>
      <button class="btn btn-info" onclick="loadFromCloud().then(ok=>{if(ok){showPage('dashboard');showToast('☁️ 已從雲端載入最新資料');}else{showToast('⚠️ 雲端無資料或連線失敗','warn');}})">☁️ 重新從雲端載入</button>
      <button class="btn btn-outline" onclick="exportJSON()">⬇ 匯出備份 JSON</button>
      <button class="btn btn-outline" onclick="importJSON()">⬆ 匯入備份 JSON</button>
      <button class="btn btn-outline" onclick="clearAllSchedules()">🗑 清除所有班表</button>
      <button class="btn btn-danger" onclick="clearStorage()">⚠ 清除全部資料（重設）</button>
    </div>
    <div class="alert alert-info" style="margin-top:12px;font-size:12px">
      ☁️ 資料即時同步至 Firebase 雲端，所有使用者共用同一份資料。建議每月定期「匯出備份 JSON」存到電腦作為備份。
    </div>
  </div>`;
  // 顯示儲存空間資訊
  setTimeout(()=>{
    const el=document.getElementById('storage-info');
    if(!el)return;
    try{
      const raw=localStorage.getItem(LS_KEY)||'';
      const kb=Math.round(raw.length/1024);
      const meta=JSON.parse(raw||'{}');
      const savedAt=meta.savedAt?new Date(meta.savedAt).toLocaleString('zh-TW'):'從未儲存';
      el.innerHTML=`本機儲存：<strong>${kb} KB</strong> · 最後儲存：<strong>${savedAt}</strong>`;
    }catch(e){el.textContent='無法讀取儲存狀態'}
  },100);
}

// 從 Modal 讀取 APOC 時間
function readShiftTimesFromModal(){
  const times={};
  const DOW_KEYS=['mon','tue','wed','thu','fri','sat','sun'];
  document.querySelectorAll('.shift-time-input').forEach(inp=>{
    const code=inp.dataset.code;
    const dow=inp.dataset.dow;
    const val=inp.value.trim();
    if(!times[code]) times[code]={};
    times[code][dow]=val||null;
  });
  return times;
}

// 從 shiftTimes 推算開店時間（取 A 班最早的時間）
function getShiftOpenFromTimes(times){
  if(!times||!times.A) return null;
  const vals=Object.values(times.A).filter(Boolean);
  if(!vals.length) return null;
  return vals.sort()[0];
}

function runAutoScheduleGroup(gid){
  // 在 Modal 開啟時先重置暫存
  _tempLeaves={};
  // 讀取已有特殊事件預填
  const y=STATE.currentYear, m=STATE.currentMonth;
  STATE.specialEvents.forEach(e=>{
    const pts=(e.date||'').split('-');if(pts.length<3)return;
    const ey=parseInt(pts[0]),em=parseInt(pts[1]),ed=parseInt(pts[2]);
    const s=STATE.staff.find(x=>x.id===e.staffId);
    if(s&&s.groupId===gid&&ey===y&&em===m){
      _tempLeaves[`${e.staffId}_${ed}`]=e.type;
    }
  });
  const groupLabel=getGroupName(gid);
  openLeaveInputModal(gid, y, m, groupLabel);
}
function runAutoSchedule(){const g=getAllGroups()[0];if(g)runAutoScheduleGroup(g.id);}

function openLeaveInputModal(gid, y, m, groupLabel){
  const days=daysInMonth(y,m);
  const staffList=STATE.staff.filter(s=>s.groupId===gid);
  const periods=getBiweeklyPeriods(y,m);

  // 讀取已有的特殊事件（本月）
  const existingLeaves={};
  STATE.specialEvents.forEach(e=>{
    const pts=(e.date||'').split('-');if(pts.length<3)return;
    const ey=parseInt(pts[0]),em=parseInt(pts[1]),ed=parseInt(pts[2]);
    if(ey===y&&em===m){
      const key=`${e.staffId}_${ed}`;
      existingLeaves[key]=e.type;
    }
  });

  // 日期表頭
  const dayHeaders=[];
  for(let d=1;d<=days;d++){
    const dow=getDOW(y,m,d);
    const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
    const isNewP=d>1&&(periods.find(p=>p.days.includes(d-1))?.idx||1)!==pidx;
    const weekend=dow===0||dow===6;
    const bg=weekend?(pidx%2===0?'#C5D8ED':'#DDD0E8'):(pidx%2===0?'#D6EAF8':'#EAF4EE');
    const bl=isNewP?'border-left:3px solid var(--accent);':'';
    dayHeaders.push(`<th style="min-width:30px;background:${bg};${bl};font-size:10px;padding:3px 2px">${d}<br>${DAY_NAMES[dow]}</th>`);
  }

  // 員工行（每格可點選循環切換）
  const staffRows=staffList.map(s=>{
    const cells=[];
    for(let d=1;d<=days;d++){
      const key=`${s.id}_${d}`;
      const type=existingLeaves[key]||'none';
      cells.push(`<td id="lv_${s.id}_${d}" 
        onclick="cycleLeaveCell('${s.id}',${d},${y},${m})"
        style="cursor:pointer;text-align:center;padding:2px;font-size:11px;${cellLeaveStyle(type)}"
        data-type="${type}">${cellLeaveText(type)}</td>`);
    }
    const excl=s.excludeAuto?'<span style="font-size:9px;color:var(--warn);display:block">不排班</span>':'';
    return `<tr>
      <td style="white-space:nowrap;padding:4px 8px;font-size:12px;font-weight:600;min-width:65px;position:sticky;left:0;background:#fff;z-index:1">
        ${s.name}${excl}
      </td>
      ${cells.join('')}
    </tr>`;
  }).join('');

  // 各雙週標題列
  const periodHeaderCells=[];
  let lastPidx=0;
  for(let d=1;d<=days;d++){
    const pidx=periods.find(p=>p.days.includes(d))?.idx||1;
    if(pidx!==lastPidx){
      const p=periods.find(x=>x.idx===pidx);
      const span=p?p.days.filter(x=>x>=d&&x<=days).length:1;
      const bg=pidx%2===0?'#AED6F1':'#A9DFBF';
      periodHeaderCells.push(`<th colspan="${span}" style="background:${bg};font-size:10px;text-align:center;padding:2px">第${pidx}雙週</th>`);
      lastPidx=pidx;
    }
  }

  showModal(`
  <div class="modal" style="width:92vw;max-width:1100px">
    <div class="modal-title">📋 ${y}年${m}月【${groupLabel}】— 排班前特休設定</div>
    <div class="alert alert-info" style="margin-bottom:10px">
      點格子可切換：<strong style="color:var(--shift-leave);background:#FEF0EE;padding:1px 6px;border-radius:4px">特（特休）</strong>
      <strong style="color:#7D3C98;background:#F0E6F8;padding:1px 6px;border-radius:4px;margin:0 4px">會（開會）</strong>
      <strong style="color:#1A5276;background:#EAF4FB;padding:1px 6px;border-radius:4px">訓（教育）</strong>
      → 再點一下清除。設定完畢後按「確認並排班」。
    </div>
    <div style="overflow-x:auto;max-height:55vh;overflow-y:auto">
      <table style="border-collapse:collapse;font-size:11px">
        <thead>
          <tr>
            <th style="min-width:65px;position:sticky;left:0;background:var(--surface2);z-index:4"></th>
            ${periodHeaderCells.join('')}
          </tr>
          <tr>
            <th style="position:sticky;left:0;background:var(--surface2);z-index:4;font-size:11px;padding:4px 8px">姓名</th>
            ${dayHeaders.join('')}
          </tr>
        </thead>
        <tbody id="leave-tbody">
          ${staffRows}
        </tbody>
      </table>
    </div>
    <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div style="font-size:11px;color:var(--text2)">
        已設定：<span id="leave-count">0</span> 筆特殊安排
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-warn" onclick="clearAllLeavesInModal('${gid}',${y},${m})">清除本月所有特殊安排</button>
        <button class="btn btn-success" onclick="confirmLeaveAndSchedule('${gid}',${y},${m})">✅ 確認並執行自動排班</button>
      </div>
    </div>
  </div>`);
  updateLeaveCount();
}

function cellLeaveStyle(type){
  if(type==='leave') return 'background:#FDECEA;color:#C0392B;font-weight:600;';
  if(type==='meeting') return 'background:#F0E6F8;color:#7D3C98;font-weight:600;';
  if(type==='training') return 'background:#EAF4FB;color:#1A5276;font-weight:600;';
  return 'background:#F9F9F9;color:#CCC;';
}
function cellLeaveText(type){
  if(type==='leave') return '特';
  if(type==='meeting') return '會';
  if(type==='training') return '訓';
  return '·';
}

// 點格子循環切換：none→leave→meeting→training→none
const LEAVE_CYCLE=['none','leave','meeting','training'];
// 暫存本次 Modal 的特殊安排（不直接寫入 STATE，等確認才存）
let _tempLeaves={};

function cycleLeaveCell(staffId, day, y, m){
  const key=`${staffId}_${day}`;
  const cur=_tempLeaves[key]||'none';
  const nextIdx=(LEAVE_CYCLE.indexOf(cur)+1)%LEAVE_CYCLE.length;
  const next=LEAVE_CYCLE[nextIdx];
  if(next==='none') delete _tempLeaves[key];
  else _tempLeaves[key]=next;
  const td=document.getElementById(`lv_${staffId}_${day}`);
  if(td){
    td.style.cssText=`cursor:pointer;text-align:center;padding:2px;font-size:11px;${cellLeaveStyle(next)}`;
    td.textContent=cellLeaveText(next);
    td.dataset.type=next;
  }
  updateLeaveCount();
}

function updateLeaveCount(){
  const el=document.getElementById('leave-count');
  if(el) el.textContent=Object.keys(_tempLeaves).length;
}

function clearAllLeavesInModal(gid, y, m){
  if(!confirm('確定清除本月所有特殊安排？'))return;
  _tempLeaves={};
  // 重置所有格子
  document.querySelectorAll('#leave-tbody td[id^="lv_"]').forEach(td=>{
    td.style.cssText=`cursor:pointer;text-align:center;padding:2px;font-size:11px;${cellLeaveStyle('none')}`;
    td.textContent=cellLeaveText('none');
    td.dataset.type='none';
  });
  updateLeaveCount();
}

function confirmLeaveAndSchedule(gid, y, m){
  // 清除本月此組的舊特殊事件
  STATE.specialEvents=STATE.specialEvents.filter(e=>{
    const pts=(e.date||'').split('-');if(pts.length<3)return true;
    const ey=parseInt(pts[0]),em=parseInt(pts[1]);
    const s=STATE.staff.find(x=>x.id===e.staffId);
    if(!s) return true;
    return !(s.groupId===gid && ey===y && em===m);
  });
  // 寫入新的特殊安排
  // ★ 修正：staffId 可能含底線（如 g1_0），不能直接 split('_')
  // key 格式為 `${staffId}_${day}`，day 一定是數字，從最後一個 _ 切割
  for(const key in _tempLeaves){
    const lastUnderscore=key.lastIndexOf('_');
    const staffId=key.substring(0,lastUnderscore);
    const day=parseInt(key.substring(lastUnderscore+1));
    const type=_tempLeaves[key];
    const dateStr=`${y}-${pad(m)}-${pad(day)}`;
    STATE.specialEvents.push({id:'ev'+Date.now()+'_'+key, staffId, date:dateStr, type, note:''});
  }
  _tempLeaves={};
  autoSave();
  closeModal();
  // 執行排班
  _doAutoSchedule(gid, y, m);
}

function _doAutoSchedule(gid, y, m){
  const groupLabel=getGroupName(gid);
  const ms=getMS(y,m);
  const staffList=STATE.staff.filter(s=>s.groupId===gid);
  const lockedCount=staffList.reduce((acc,s)=>{
    const sd=ms[s.id]||{};
    return acc+Object.values(sd).filter(c=>c&&c.locked).length;
  },0);
  autoScheduleGroup(y,m,gid);
  showPage(`schedule-${gid}`);
  setTimeout(()=>{
    const overList=STATE.staff.filter(s=>s.groupId===gid&&!s.excludeAuto&&calcHours(s.id,y,m)>80)
      .map(s=>`${s.name}(${calcHours(s.id,y,m)}h)`);
    let msg=`✅ ${y}年${m}月【${groupLabel}】自動排班完成！`;
    if(lockedCount>0) msg+=`\n🔒 已保留 ${lockedCount} 個手動鎖定格。`;
    if(overList.length) msg+=`\n⚠️ 工時超標：${overList.join('、')}`;
    alert(msg);
  },80);
}

// ── SheetJS 格式化班表匯出 ──
async function exportExcelFormatted(y,m,gid){
  const ms=STATE.schedules[schedKey(y,m)]||{};
  const staffList=gid?STATE.staff.filter(s=>s.groupId===gid):STATE.staff;
  if(staffList.every(s=>!Object.keys(ms[s.id]||{}).length)){alert('尚未產生班表');return}

  // 動態載入 SheetJS
  if(!window.XLSX){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
  }

  const days=daysInMonth(y,m);
  const periods=getBiweeklyPeriods(y,m);
  const groupLabel=gid?getGroupName(gid):'中壢課';
  const wb=XLSX.utils.book_new();
  const ws={};
  const merges=[];
  let R=0; // 目前列數（0-based）

  // ── 色彩常數 ──
  const C={
    title:   {fgColor:{rgb:'2C2420'}},
    header:  {fgColor:{rgb:'F0EEE9'}},
    weekend: {fgColor:{rgb:'EEE8F0'}},
    period2: {fgColor:{rgb:'EAF4FB'}},
    shiftA:  {fgColor:{rgb:'D4E8D0'}},
    shiftP:  {fgColor:{rgb:'D0E0F8'}},
    shiftO:  {fgColor:{rgb:'FFE4B5'}},
    shiftB:  {fgColor:{rgb:'FDE8F5'}},
    shiftC:  {fgColor:{rgb:'E8F4E8'}},
    shiftX:  {fgColor:{rgb:'F0EEE9'}},
    shiftLeave:{fgColor:{rgb:'F7D9D0'}},
    shiftMeet: {fgColor:{rgb:'E8D8F0'}},
    statHdr: {fgColor:{rgb:'C4A882'}},
    statVal: {fgColor:{rgb:'FFFAF5'}},
    accent:  {fgColor:{rgb:'8B6F5E'}},
    white:   {fgColor:{rgb:'FFFFFF'}},
    rowSub:  {fgColor:{rgb:'F7F6F3'}},
  };

  function font(bold,sz,color){return {bold:!!bold,sz:sz||9,color:{rgb:color||'2C2420'},name:'微軟正黑體'}}
  function border(){return {top:{style:'thin',color:{rgb:'CCCCCC'}},bottom:{style:'thin',color:{rgb:'CCCCCC'}},left:{style:'thin',color:{rgb:'CCCCCC'}},right:{style:'thin',color:{rgb:'CCCCCC'}}}}
  function thickLeft(){return {top:{style:'thin',color:{rgb:'CCCCCC'}},bottom:{style:'thin',color:{rgb:'CCCCCC'}},left:{style:'medium',color:{rgb:'8B6F5E'}},right:{style:'thin',color:{rgb:'CCCCCC'}}}}
  function cell(v,fill,fnt,align,bdr,numFmt){
    return {v,t:typeof v==='number'?'n':'s',s:{fill:{patternType:'solid',...fill},font:fnt||font(),alignment:{horizontal:align||'center',vertical:'center',wrapText:true},border:bdr||border(),...(numFmt?{numFmt}:{})}};
  }

  function setCell(c,r,val){ws[XLSX.utils.encode_cell({c,r})]=val}
  function addMerge(rs,re,cs,ce){merges.push({s:{r:rs,c:cs},e:{r:re,c:ce}})}

  // 固定欄位數
  const fixedCols=4; // 人員/店編號、項目 + 2備用
  const dataCols=days;
  const statCols=10; // 右側統計
  const totalCols=fixedCols+dataCols+statCols;

  // 欄寬設定
  const colWidths=[];
  colWidths.push({wch:12},{wch:8},{wch:8},{wch:8}); // 固定4欄
  for(let d=0;d<days;d++) colWidths.push({wch:4.5});
  colWidths.push({wch:8},{wch:8},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7});
  ws['!cols']=colWidths;

  // ── 大標題列 ──
  setCell(0,R,cell(`${y}-${pad(m)} ${groupLabel} 班表`,C.title,font(true,13,'FFFFFF'),'center',border()));
  addMerge(R,R,0,totalCols-1);
  ws[XLSX.utils.encode_cell({c:0,r:R})].s.fill={patternType:'solid',...C.title};
  ws[XLSX.utils.encode_cell({c:0,r:R})].s.font=font(true,13,'FFFFFF');
  R++;

  // 月標準工時、個人月工時標題
  const stdHours=160; // 月標準工時
  setCell(totalCols-statCols,R,cell('月標準工時：'+stdHours+'h',C.statHdr,font(true,9,'2C2420'),'left'));
  addMerge(R,R,totalCols-statCols,totalCols-1);
  R++;

  // ── 每個員工區塊 ──
  staffList.forEach((s,si)=>{
    const sd=ms[s.id]||{};
    const store=STATE.stores.find(x=>getAssignedStores(s.id).includes(x.id))||null;
    const storeLabel=store?`${store.storeNo||''} ${store.name.replace(/中壢|平鎮|楊梅|內壢|龍潭/,'').substring(0,6)}`:'';

    // 統計計算
    let totalWork=0,totalMeal=0,leaveDays=0,offDays=0,meetDays=0;
    const periodH={};
    periods.forEach(p=>{p.days.forEach(d=>{
      const c=sd[d];
      const pidx=p.idx;
      if(!periodH[pidx])periodH[pidx]=0;
      if(c&&c.type==='work'){
        const sh=STATE.shifts.find(x=>x.id===c.shiftId);
        const stxe=STATE.stores.find(q=>q.id===c?.storeId);const dwxe=getDOW(y,m,d);const h=getCellWorkH(c,stxe,dwxe);
        totalWork+=h; periodH[pidx]+=h;
        totalMeal+=0.5;
      }
      if(!c||c.type==='off') offDays++;
      if(c&&c.type==='leave') leaveDays++;
      if(c&&c.type==='meeting') meetDays++;
    })});
    const prevPeriodOT=0; // 上旬加班（預留）
    const workDays=days-offDays-leaveDays-meetDays;

    // ═══ 列1：人員/店編號 + 星期 + 班別 ═══
    const blockStart=R;

    // 固定欄 - 人員資訊

// ==================== localStorage 持久化 ====================
const LS_KEY = 'schedule_system_v1';

function saveToStorage(){
  try{
    const data={
      staff: STATE.staff,
      stores: STATE.stores,
      shifts: STATE.shifts,
      schedules: STATE.schedules,
      specialEvents: STATE.specialEvents,
      staffAssignments: STATE.staffAssignments,
      groups: STATE.groups,
      biweeklyAnchor: STATE.biweeklyAnchor,
      biweeklyOverrides: STATE.biweeklyOverrides,
      storeViewNotes: STATE.storeViewNotes||{},
      storeShiftTimes: STATE.storeShiftTimes||{},
      savedAt: new Date().toISOString(),
    };
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    return true;
  }catch(e){
    console.warn('localStorage save failed:', e);
    return false;
  }
}

// 預設班別（當 localStorage/Firebase 沒有班別資料時補回）
function getDefaultShifts(){
  return [
    {id:'s1',name:'A班',code:'A'},
    {id:'s3',name:'P班',code:'P'},
    {id:'s4',name:'O班',code:'O'},
    {id:'s5',name:'C班',code:'C',note:'特殊班：打烊前回去，無開店'},
    {id:'s6',name:'B班',code:'B',note:'上課後回去上班'},
  ];
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data=JSON.parse(raw);
    // 驗證基本結構
    if(!data.staff||!data.stores||!data.schedules) return false;
    STATE.staff=data.staff;
    STATE.stores=data.stores;
    STATE.schedules=data.schedules;
    STATE.specialEvents=data.specialEvents||[];
    STATE.staffAssignments=data.staffAssignments||{};
    STATE.biweeklyAnchor=data.biweeklyAnchor||'2025-07-05';
    STATE.biweeklyOverrides=data.biweeklyOverrides||{};
    STATE.storeViewNotes=data.storeViewNotes||{};
    STATE.storeShiftTimes=data.storeShiftTimes||{};
    // 班別：若已儲存則還原，若空陣列則補回預設（修復舊版本遺失問題）
    if(data.shifts&&data.shifts.length>0){
      STATE.shifts=data.shifts;
    } else {
      STATE.shifts=getDefaultShifts();
      console.warn('班別資料遺失，已自動補回預設班別 A/P/O/C/B');
    }
    // 組別：若有儲存則還原
    if(data.groups&&data.groups.length>0) STATE.groups=data.groups;
    console.log('資料已從 localStorage 還原，儲存時間：', data.savedAt);
    return true;
  }catch(e){
    console.warn('localStorage load failed:', e);
    return false;
  }
}

function clearStorage(){
  if(!confirm('確定要清除全部資料？\n這會清除本機和雲端所有班表、人員、店家設定，並重設為系統預設值。\n此操作無法復原！'))return;
  localStorage.removeItem(LS_KEY);
  initData();
  saveToCloud(true); // 把空白狀態推上雲端
  showPage('dashboard');
  showToast('已清除所有資料，已還原為預設值');
}

// 自動儲存：每次 showPage 和重要操作後觸發
// localStorage 立即存，雲端 2 秒節流後推送
let _saveTimer=null;
let _cloudTimer=null;
function autoSave(){
  // localStorage：500ms debounce
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    saveToStorage();
    updateSaveStatus();
  },500);
  // 雲端：2000ms debounce（節流避免頻繁寫 Firestore）
  if(_cloudTimer) clearTimeout(_cloudTimer);
  _cloudTimer=setTimeout(()=>{
    if(window.saveToCloud) window.saveToCloud(false);
  },2000);
}

function updateSaveStatus(cloudOk){
  const el=document.getElementById('save-status');
  if(!el) return;
  const now=new Date();
  const t=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  if(cloudOk===false){
    el.textContent=`💾 ${t} 本機已存`;
    el.style.color='rgba(255,200,100,0.9)';
  } else {
    el.textContent=`☁️ ${t} 已同步`;
    el.style.color='rgba(255,255,255,0.6)';
  }
}

// Toast 通知
function showToast(msg, type='success'){
  const existing=document.getElementById('toast-msg');
  if(existing) existing.remove();
  const div=document.createElement('div');
  div.id='toast-msg';
  div.textContent=msg;
  div.style.cssText=`position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:opacity .3s;
    background:${type==='error'?'#C0392B':type==='warn'?'#E67E22':'#27AE60'};color:#FFF`;
  document.body.appendChild(div);
  setTimeout(()=>{div.style.opacity='0';setTimeout(()=>div.remove(),300)},2500);
}

function pushToCloud(){
  if(!window.saveToCloud){
    showToast('⚠️ Firebase 未初始化，無法推送','warn');
    return;
  }
  if(!confirm('確定要將本機資料推送到雲端嗎？\n這會覆蓋雲端現有的資料。')) return;
  showToast('正在推送到雲端...');
  window.saveToCloud(false).then(()=>{
    showToast('✅ 本機資料已成功推送到雲端');
    // 推送成功後同步一次確認
    setTimeout(()=>{
      window.loadFromCloud().then(ok=>{
        if(ok) showToast('☁️ 雲端資料確認成功');
      });
    }, 1500);
  }).catch(e=>{
    console.error('推送失敗:',e);
    showToast('⚠️ 推送失敗：'+e.message,'warn');
  });
}

function exportJSON(){
  // 匯出目前 STATE 為 JSON 備份
  const data={
    staff:STATE.staff,stores:STATE.stores,schedules:STATE.schedules,
    specialEvents:STATE.specialEvents,staffAssignments:STATE.staffAssignments,

    exportedAt:new Date().toISOString(),version:'v1',
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`中壢課排班備份_${new Date().toISOString().slice(0,10)}.json`;a.click();
  showToast('備份檔案已下載');
}
function importJSON(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.staff&&data.stores&&data.schedules){
          STATE.staff=data.staff;
          STATE.stores=data.stores;
          STATE.schedules=data.schedules;
          STATE.specialEvents=data.specialEvents||[];
          STATE.staffAssignments=data.staffAssignments||{};
          STATE.biweeklyAnchor=data.biweeklyAnchor||'2025-07-05';
          STATE.biweeklyOverrides=data.biweeklyOverrides||{};
          STATE.storeViewNotes=data.storeViewNotes||{};
          STATE.storeShiftTimes=data.storeShiftTimes||{};
          saveToStorage();
          showToast('✅ 備份檔案匯入成功');
          showPage('dashboard');
        }else{showToast('檔案格式不正確，請確認','error')}
      }catch{showToast('匯入失敗，請確認檔案格式','error')}
    };reader.readAsText(file);
  };input.click();
}

function timeDiff(start,end){
  if(!start||!end)return 0;
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  return ((eh*60+em)-(sh*60+sm))/60;
}

}
function guestMode(){
  STATE.login={loggedIn:false,empNo:'',role:'guest'};
  document.getElementById('login-overlay').style.display='none';
  updateHeaderLogin();
  showPage('dashboard');
}

// ==================== 初始化 ====================
function _init(){
  // 先用 localStorage 快速還原畫面
  const restored = loadFromStorage();
  if(!restored) initData();
  STATE.login = {loggedIn:true, empNo:'03250', role:'admin', name:'中壢課'};
  showPage('dashboard');
  updateSaveStatus();

  // 等待 Firebase module 載入完成（最多 8 秒，每 200ms 輪詢）
  let waited = 0;
  const tryCloud = setInterval(async ()=>{
    waited += 200;
    if(typeof window.saveToCloud === 'function'){
      clearInterval(tryCloud);
      // Firebase 就緒，嘗試從雲端載入
      const cloudOk = await window.loadFromCloud();
      if(cloudOk){
        showToast('☁️ 已從雲端載入最新班表');
        showPage(STATE.currentPage || 'dashboard');
      } else {
        // 雲端無資料 → 把本機資料推上去
        const hasLocal = localStorage.getItem('schedule_system_v1');
        if(hasLocal){
          console.log('☁️ 雲端無資料，推送本機資料...');
          await window.saveToCloud(false);
          showToast('☁️ 本機資料已推送至雲端');
        }
      }
      if(window.startCloudSync) window.startCloudSync();
    } else if(waited >= 8000){
      clearInterval(tryCloud);
      console.warn('Firebase 載入超時，使用本機模式');
      showToast('⚠️ 雲端連線失敗，使用本機資料', 'warn');
    }
  }, 200);
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',_init);
} else {
  _init();
}
</script>
